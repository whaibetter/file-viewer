server:
  host: 127.0.0.1
  port: 9001
  session_timeout: 3600
storage:
  data_dir: /etc/file-viewer
  user_config_file: /etc/file-viewer/user_config.yaml
security:
  delete_whitelist:
  - /tmp
  - /var/tmp
  - /home
permissions:
  folder_permissions: null
  default_permissions:
    read: true
    write: true
download_limits:
  max_single_file_size: 104857600
  max_total_download_size: 209715200
  max_files_in_zip: 500
  max_dir_depth: 20
  max_file_preview_size: 2097152
logging:
  level: INFO
