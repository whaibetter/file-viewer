# File Viewer 配置文件
# 配置文件路径: /etc/file-viewer/config.yaml

# 服务器配置
server:
  host: "127.0.0.1"
  port: 9001
  session_timeout: 3600  # 会话超时时间（秒）

# 数据存储路径
storage:
  password_file: "/etc/file-viewer.passwd"      # 密码文件路径
  whitelist_file: "/etc/file-viewer-whitelist.json"  # 删除白名单文件路径

# 删除白名单 - 只允许删除这些路径下的文件
# 格式: 目录绝对路径列表
delete_whitelist:
  - "/tmp"
  - "/var/tmp"

# 文件夹权限配置
# 可针对不同目录配置读写权限
folder_permissions:
  # 示例配置（取消注释启用）：
  # "/var/www/html":
  #   read: true
  #   write: true
  # "/etc/nginx":
  #   read: true
  #   write: true
  # "/etc":
  #   read: true
  #   write: false

# 默认权限（未匹配到具体配置的目录使用此配置）
default_permissions:
  read: true
  write: true

# 下载限制配置
download_limits:
  max_single_file_size: 104857600    # 单文件最大 100MB
  max_total_download_size: 209715200 # 批量下载总大小最大 200MB
  max_files_in_zip: 500              # ZIP 中最多文件数
  max_dir_depth: 20                  # 目录最大递归深度
  max_file_preview_size: 2097152     # 文件预览最大 2MB

# 日志配置
logging:
  level: "INFO"  # DEBUG, INFO, WARNING, ERROR
