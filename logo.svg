<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 64 64" width="64" height="64">
  <defs>
    <linearGradient id="bgGrad" x1="0%" y1="0%" x2="100%" y2="100%">
      <stop offset="0%" style="stop-color:#1f6feb"/>
      <stop offset="100%" style="stop-color:#58a6ff"/>
    </linearGradient>
    <linearGradient id="iconGrad" x1="0%" y1="0%" x2="100%" y2="100%">
      <stop offset="0%" style="stop-color:#ffffff"/>
      <stop offset="100%" style="stop-color:#c9d1d9"/>
    </linearGradient>
  </defs>
  <!-- Background rounded square -->
  <rect x="4" y="4" width="56" height="56" rx="12" ry="12" fill="url(#bgGrad)"/>
  <!-- Server icon -->
  <g fill="url(#iconGrad)">
    <!-- Server body -->
    <rect x="14" y="16" width="36" height="12" rx="2" ry="2" fill="url(#iconGrad)" opacity="0.95"/>
    <rect x="14" y="30" width="36" height="12" rx="2" ry="2" fill="url(#iconGrad)" opacity="0.85"/>
    <rect x="14" y="44" width="36" height="8" rx="2" ry="2" fill="url(#iconGrad)" opacity="0.75"/>
    <!-- Server lights -->
    <circle cx="20" cy="22" r="2" fill="#4ade80"/>
    <circle cx="20" cy="36" r="2" fill="#4ade80"/>
    <!-- Server lines -->
    <rect x="28" y="20" width="16" height="2" rx="1" fill="#21262d" opacity="0.6"/>
    <rect x="28" y="24" width="12" height="2" rx="1" fill="#21262d" opacity="0.4"/>
    <rect x="28" y="34" width="16" height="2" rx="1" fill="#21262d" opacity="0.6"/>
    <rect x="28" y="38" width="10" height="2" rx="1" fill="#21262d" opacity="0.4"/>
  </g>
</svg>
