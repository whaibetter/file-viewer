<!DOCTYPE html>
<html lang="zh-CN">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>File Viewer</title>
    <script src="https://cdn.jsdelivr.net/npm/marked@12/marked.min.js"></script>
    <style>
        * { margin: 0; padding: 0; box-sizing: border-box; }

        body {
            font-family: 'Segoe UI', 'PingFang SC', 'Microsoft YaHei', monospace;
            background: #0d1117;
            color: #c9d1d9;
            height: 100vh;
            display: flex;
            flex-direction: column;
        }

        header {
            background: #161b22;
            border-bottom: 1px solid #30363d;
            padding: 14px 24px;
            display: flex;
            align-items: center;
            gap: 12px;
            flex-shrink: 0;
        }

        header h1 {
            font-size: 1.1em;
            color: #58a6ff;
            font-weight: 600;
            letter-spacing: 0.5px;
        }

        .tag {
            font-size: 0.7em;
            background: #21262d;
            color: #8b949e;
            padding: 2px 8px;
            border-radius: 12px;
            border: 1px solid #30363d;
        }

        /* ── Nav Tabs ── */
        .nav-tabs {
            display: flex;
            gap: 2px;
            margin-left: 16px;
        }

        .nav-tab {
            background: none;
            border: none;
            color: #8b949e;
            padding: 6px 14px;
            font-size: 0.88em;
            cursor: pointer;
            border-radius: 6px;
            transition: all 0.15s;
        }

        .nav-tab:hover { color: #c9d1d9; background: #21262d; }
        .nav-tab.active { color: #58a6ff; background: #21262d; font-weight: 600; }

        /* ── Common ── */
        .search-bar {
            background: #161b22;
            border-bottom: 1px solid #30363d;
            padding: 12px 24px;
            display: flex;
            gap: 8px;
            flex-shrink: 0;
        }

        .path-input {
            flex: 1;
            background: #0d1117;
            border: 1px solid #30363d;
            border-radius: 6px;
            padding: 8px 14px;
            color: #c9d1d9;
            font-family: 'Cascadia Code', 'Fira Code', 'Consolas', monospace;
            font-size: 0.95em;
            outline: none;
            transition: border-color 0.2s;
        }

        .path-input:focus {
            border-color: #58a6ff;
            box-shadow: 0 0 0 3px rgba(88, 166, 255, 0.1);
        }

        .btn {
            background: #21262d;
            color: #c9d1d9;
            border: 1px solid #30363d;
            border-radius: 6px;
            padding: 8px 18px;
            cursor: pointer;
            font-size: 0.9em;
            transition: background 0.15s, border-color 0.15s;
            white-space: nowrap;
        }

        .btn:hover { background: #30363d; border-color: #8b949e; }
        .btn.primary { background: #1f6feb; border-color: #388bfd; color: #fff; }
        .btn.primary:hover { background: #388bfd; }

        .quick-paths {
            background: #161b22;
            border-bottom: 1px solid #30363d;
            padding: 6px 24px;
            display: flex;
            gap: 6px;
            flex-wrap: wrap;
            flex-shrink: 0;
        }

        .quick-btn {
            background: #21262d;
            border: 1px solid #30363d;
            color: #8b949e;
            padding: 3px 10px;
            border-radius: 4px;
            font-size: 0.8em;
            cursor: pointer;
            font-family: monospace;
            transition: all 0.15s;
        }

        .quick-btn:hover { color: #58a6ff; border-color: #58a6ff; background: #0d1117; }

        .breadcrumb {
            padding: 8px 24px;
            font-size: 0.85em;
            color: #8b949e;
            background: #0d1117;
            border-bottom: 1px solid #21262d;
            min-height: 34px;
            display: flex;
            align-items: center;
            gap: 4px;
            flex-shrink: 0;
            flex-wrap: wrap;
        }

        .breadcrumb span { color: #58a6ff; cursor: pointer; }
        .breadcrumb span:hover { text-decoration: underline; }
        .breadcrumb .sep { color: #30363d; }

        .content-area {
            flex: 1;
            overflow: auto;
            padding: 0;
        }

        .file-header {
            display: flex;
            justify-content: space-between;
            align-items: center;
            padding: 10px 24px;
            background: #161b22;
            border-bottom: 1px solid #30363d;
            font-size: 0.85em;
            color: #8b949e;
            position: sticky;
            top: 0;
            z-index: 10;
        }

        .file-meta { display: flex; gap: 16px; }
        .file-meta span { display: flex; align-items: center; gap: 4px; }

        pre {
            padding: 16px 24px;
            font-family: 'Cascadia Code', 'Fira Code', 'Consolas', 'Monaco', monospace;
            font-size: 0.88em;
            line-height: 1.6;
            color: #e6edf3;
            white-space: pre-wrap;
            word-break: break-all;
            tab-size: 4;
            counter-reset: line;
        }

        .line { display: flex; gap: 0; }
        .line-num { user-select: none; color: #484f58; min-width: 44px; text-align: right; padding-right: 16px; flex-shrink: 0; }
        .line-content { flex: 1; }

        .dir-table { width: 100%; border-collapse: collapse; }
        .dir-table th { background: #161b22; padding: 10px 24px; text-align: left; font-size: 0.85em; color: #8b949e; font-weight: 500; border-bottom: 1px solid #30363d; position: sticky; top: 0; }
        .dir-table td { padding: 8px 24px; border-bottom: 1px solid #21262d; font-size: 0.9em; }
        .dir-table tr:hover td { background: #161b22; }
        .dir-icon { margin-right: 8px; }
        .dir-name { color: #58a6ff; cursor: pointer; }
        .dir-name:hover { text-decoration: underline; }
        .file-name { color: #c9d1d9; cursor: pointer; }
        .file-name:hover { color: #58a6ff; text-decoration: underline; }
        .file-size { color: #8b949e; text-align: right; font-size: 0.85em; }

        .state-box { display: flex; flex-direction: column; align-items: center; justify-content: center; padding: 80px 24px; gap: 12px; color: #8b949e; }
        .state-icon { font-size: 3em; }
        .state-title { font-size: 1.1em; color: #c9d1d9; }
        .state-msg { font-size: 0.9em; max-width: 400px; text-align: center; }
        .error { color: #f85149; }

        .loading-bar { height: 2px; background: #58a6ff; width: 0; transition: width 0.3s; position: fixed; top: 0; left: 0; z-index: 100; }

        .view-toggle { display: flex; gap: 4px; }
        .toggle-btn { background: #21262d; border: 1px solid #30363d; color: #8b949e; padding: 3px 12px; border-radius: 4px; font-size: 0.82em; cursor: pointer; transition: all 0.15s; }
        .toggle-btn:hover { color: #c9d1d9; border-color: #8b949e; }
        .toggle-btn.active { background: #1f6feb; border-color: #388bfd; color: #fff; }

        /* ── Markdown ── */
        .md-body { padding: 32px 48px; max-width: 860px; margin: 0 auto; font-family: 'Segoe UI', 'PingFang SC', 'Microsoft YaHei', sans-serif; font-size: 0.95em; line-height: 1.75; color: #e6edf3; }
        .md-body h1, .md-body h2, .md-body h3, .md-body h4, .md-body h5, .md-body h6 { color: #e6edf3; margin: 1.5em 0 0.5em; font-weight: 600; line-height: 1.3; }
        .md-body h1 { font-size: 2em; border-bottom: 1px solid #30363d; padding-bottom: 0.3em; }
        .md-body h2 { font-size: 1.5em; border-bottom: 1px solid #21262d; padding-bottom: 0.25em; }
        .md-body h3 { font-size: 1.25em; }
        .md-body p { margin: 0.75em 0; }
        .md-body a { color: #58a6ff; text-decoration: none; }
        .md-body a:hover { text-decoration: underline; }
        .md-body code { font-family: 'Cascadia Code', 'Fira Code', 'Consolas', monospace; font-size: 0.88em; background: #21262d; border: 1px solid #30363d; border-radius: 4px; padding: 0.15em 0.4em; color: #e6edf3; }
        .md-body pre { background: #161b22; border: 1px solid #30363d; border-radius: 6px; padding: 16px 20px; overflow-x: auto; margin: 1em 0; white-space: pre; word-break: normal; counter-reset: none; }
        .md-body pre code { background: none; border: none; padding: 0; font-size: 0.87em; color: #e6edf3; }
        .md-body blockquote { border-left: 4px solid #30363d; margin: 1em 0; padding: 0.5em 1em; color: #8b949e; background: #161b22; border-radius: 0 4px 4px 0; }
        .md-body blockquote p { margin: 0; }
        .md-body ul, .md-body ol { padding-left: 2em; margin: 0.75em 0; }
        .md-body li { margin: 0.3em 0; }
        .md-body table { border-collapse: collapse; width: 100%; margin: 1em 0; font-size: 0.9em; }
        .md-body th { background: #161b22; color: #c9d1d9; font-weight: 600; padding: 8px 12px; border: 1px solid #30363d; text-align: left; }
        .md-body td { padding: 7px 12px; border: 1px solid #21262d; }
        .md-body tr:nth-child(even) td { background: #161b22; }
        .md-body hr { border: none; border-top: 1px solid #30363d; margin: 2em 0; }
        .md-body img { max-width: 100%; border-radius: 6px; }
        .md-body input[type="checkbox"] { margin-right: 6px; accent-color: #58a6ff; }

        /* ── Login ── */
        #loginOverlay { display: none; position: fixed; inset: 0; background: #0d1117; z-index: 1000; justify-content: center; align-items: center; }
        #loginOverlay.visible { display: flex; }
        .login-card { background: #161b22; border: 1px solid #30363d; border-radius: 12px; padding: 40px 36px; width: 340px; display: flex; flex-direction: column; gap: 20px; }
        .login-card h2 { font-size: 1.3em; color: #e6edf3; text-align: center; font-weight: 600; }
        .login-card .subtitle { text-align: center; font-size: 0.85em; color: #8b949e; margin-top: -12px; }
        .login-field { display: flex; flex-direction: column; gap: 6px; }
        .login-field label { font-size: 0.85em; color: #8b949e; }
        .login-field input { background: #0d1117; border: 1px solid #30363d; border-radius: 6px; padding: 10px 14px; color: #e6edf3; font-size: 0.95em; outline: none; transition: border-color 0.2s; }
        .login-field input:focus { border-color: #58a6ff; box-shadow: 0 0 0 3px rgba(88, 166, 255, 0.1); }
        .login-btn { background: #1f6feb; border: 1px solid #388bfd; border-radius: 6px; color: #fff; padding: 10px; font-size: 0.95em; font-weight: 600; cursor: pointer; transition: background 0.15s; }
        .login-btn:hover { background: #388bfd; }
        .login-btn:disabled { background: #21262d; border-color: #30363d; color: #484f58; cursor: not-allowed; }
        .login-error { display: none; background: rgba(248, 81, 73, 0.1); border: 1px solid rgba(248, 81, 73, 0.4); border-radius: 6px; padding: 8px 12px; font-size: 0.85em; color: #f85149; text-align: center; }
        .login-error.visible { display: block; }

        .logout-btn { margin-left: auto; background: none; border: 1px solid #30363d; border-radius: 6px; color: #8b949e; padding: 4px 12px; font-size: 0.82em; cursor: pointer; transition: all 0.15s; }
        .logout-btn:hover { color: #f85149; border-color: #f85149; }

        /* ── System Monitor Dashboard ── */
        .monitor-wrap {
            padding: 24px;
            overflow-y: auto;
            flex: 1;
        }

        .mon-header {
            display: flex;
            justify-content: space-between;
            align-items: center;
            margin-bottom: 20px;
        }

        .mon-header h2 { font-size: 1.15em; color: #e6edf3; font-weight: 600; }

        .mon-meta {
            font-size: 0.8em;
            color: #484f58;
            display: flex;
            gap: 16px;
            align-items: center;
        }

        .mon-live {
            display: inline-flex;
            align-items: center;
            gap: 5px;
            color: #4ade80;
            font-size: 0.82em;
        }

        .mon-live-dot {
            width: 6px; height: 6px;
            background: #4ade80;
            border-radius: 50%;
            animation: pulse 2s infinite;
        }

        @keyframes pulse {
            0%, 100% { opacity: 1; }
            50% { opacity: 0.3; }
        }

        .mon-grid {
            display: grid;
            grid-template-columns: repeat(auto-fill, minmax(340px, 1fr));
            gap: 16px;
        }

        .mon-card {
            background: #161b22;
            border: 1px solid #30363d;
            border-radius: 10px;
            padding: 20px;
        }

        .mon-card-title {
            font-size: 0.82em;
            color: #8b949e;
            text-transform: uppercase;
            letter-spacing: 0.8px;
            margin-bottom: 14px;
            display: flex;
            align-items: center;
            gap: 6px;
        }

        .mon-big-num {
            font-size: 2em;
            font-weight: 700;
            color: #e6edf3;
            line-height: 1;
            margin-bottom: 4px;
            font-family: 'Cascadia Code', 'Fira Code', monospace;
        }

        .mon-sub { font-size: 0.82em; color: #484f58; }

        /* Progress bar */
        .pbar-wrap {
            background: #21262d;
            border-radius: 4px;
            height: 8px;
            margin: 10px 0 6px;
            overflow: hidden;
        }

        .pbar {
            height: 100%;
            border-radius: 4px;
            transition: width 0.6s ease;
        }

        .pbar-green { background: #4ade80; }
        .pbar-yellow { background: #facc15; }
        .pbar-red { background: #f85149; }

        .mon-row {
            display: flex;
            justify-content: space-between;
            padding: 5px 0;
            font-size: 0.88em;
            border-bottom: 1px solid #21262d;
        }

        .mon-row:last-child { border-bottom: none; }
        .mon-row .label { color: #8b949e; }
        .mon-row .val { color: #e6edf3; font-family: monospace; }

        /* Disk cards */
        .disk-item { margin-bottom: 12px; }
        .disk-item:last-child { margin-bottom: 0; }
        .disk-mount { font-family: monospace; font-size: 0.88em; color: #58a6ff; }
        .disk-device { font-size: 0.78em; color: #484f58; }
        .disk-detail { display: flex; justify-content: space-between; font-size: 0.82em; color: #8b949e; margin-top: 2px; }

        /* Network */
        .net-rate { font-size: 1.4em; font-weight: 600; color: #e6edf3; font-family: monospace; }
        .net-label { font-size: 0.78em; color: #8b949e; margin-top: 2px; }
        .net-pair { display: flex; gap: 32px; margin-bottom: 12px; }

        /* Process table */
        .proc-table { width: 100%; border-collapse: collapse; font-size: 0.82em; }
        .proc-table th { color: #8b949e; font-weight: 500; text-align: left; padding: 4px 8px; border-bottom: 1px solid #30363d; }
        .proc-table td { padding: 4px 8px; border-bottom: 1px solid #21262d; color: #c9d1d9; font-family: monospace; }
        .proc-table tr:hover td { background: #0d1117; }

        .mon-card.wide { grid-column: 1 / -1; }

        /* Hide sections */
        .section-hidden { display: none !important; }
        
        /* Edit Textarea */
        .edit-textarea {
            width: 100%;
            min-height: calc(100vh - 200px);
            background: #0d1117;
            border: none;
            padding: 16px 24px;
            font-family: 'Cascadia Code', 'Fira Code', 'Consolas', 'Monaco', monospace;
            font-size: 0.88em;
            line-height: 1.6;
            color: #e6edf3;
            resize: vertical;
            outline: none;
            tab-size: 4;
            white-space: pre;
            overflow-x: auto;
        }
        .edit-textarea:focus { box-shadow: inset 0 0 0 1px #30363d; }
        .perm-indicator { display: inline-flex; align-items: center; gap: 4px; padding: 2px 8px; background: #21262d; border-radius: 4px; font-size: 0.8em; }
        .perm-readonly { color: #f85149; }
        .perm-readwrite { color: #4ade80; }
        
        /* Toolbar */
        .dir-toolbar { background: #161b22; border-bottom: 1px solid #30363d; padding: 10px 24px; display: flex; gap: 8px; }
        .toolbar-btn { background: #21262d; border: 1px solid #30363d; color: #c9d1d9; padding: 6px 14px; border-radius: 6px; font-size: 0.88em; cursor: pointer; transition: all 0.15s; }
        .toolbar-btn:hover { background: #30363d; border-color: #8b949e; }
        .perm-link:hover { text-decoration: underline; }
        
        /* Modal */
        .modal-overlay { position: fixed; inset: 0; background: rgba(0, 0, 0, 0.7); z-index: 2000; display: none; justify-content: center; align-items: center; }
        .modal-overlay.visible { display: flex !important; }
        .modal-box { background: #161b22; border: 1px solid #30363d; border-radius: 12px; min-width: 400px; max-width: 500px; max-height: 80vh; overflow: hidden; box-shadow: 0 8px 32px rgba(0, 0, 0, 0.4); }
        .modal-header { display: flex; justify-content: space-between; align-items: center; padding: 16px 20px; border-bottom: 1px solid #30363d; }
        .modal-header h3 { margin: 0; font-size: 1.1em; color: #e6edf3; }
        .modal-close { background: none; border: none; color: #8b949e; font-size: 1.5em; cursor: pointer; padding: 0; line-height: 1; }
        .modal-close:hover { color: #f85149; }
        .modal-content { padding: 20px; }
        .modal-field { margin-bottom: 16px; }
        .modal-field label { display: block; margin-bottom: 6px; font-size: 0.9em; color: #8b949e; }
        .modal-field input, .modal-field select { width: 100%; background: #0d1117; border: 1px solid #30363d; border-radius: 6px; padding: 10px 14px; color: #c9d1d9; font-size: 0.95em; outline: none; }
        .modal-field input:focus, .modal-field select:focus { border-color: #58a6ff; }
        .modal-actions { display: flex; gap: 8px; justify-content: flex-end; margin-top: 20px; }
        .modal-btn { padding: 8px 20px; border-radius: 6px; font-size: 0.9em; cursor: pointer; transition: all 0.15s; }
        .modal-btn-cancel { background: #21262d; border: 1px solid #30363d; color: #c9d1d9; }
        .modal-btn-cancel:hover { background: #30363d; }
        .modal-btn-primary { background: #238636; border: 1px solid #2ea043; color: #fff; }
        .modal-btn-primary:hover { background: #2ea043; }
        
        /* Upload */
        .upload-zone { border: 2px dashed #30363d; border-radius: 8px; padding: 30px; text-align: center; cursor: pointer; transition: all 0.2s; }
        .upload-zone:hover, .upload-zone.dragover { border-color: #58a6ff; background: rgba(88, 166, 255, 0.05); }
        .upload-zone input[type="file"] { display: none; }
        
        /* Permission grid */
        .perm-grid { display: grid; grid-template-columns: repeat(3, 1fr); gap: 8px; margin-bottom: 16px; }
        .perm-check { display: flex; flex-direction: column; align-items: center; padding: 10px; background: #21262d; border-radius: 6px; }
        .perm-check label { font-size: 0.8em; color: #8b949e; margin-bottom: 4px; }
        .perm-check input[type="checkbox"] { width: 18px; height: 18px; accent-color: #58a6ff; }
    </style>
</head>
<body>

<div class="loading-bar" id="loadingBar"></div>

<!-- Login Overlay -->
<div id="loginOverlay" class="visible">
    <div class="login-card">
        <h2>File Viewer</h2>
        <p class="subtitle">请输入密码以继续</p>
        <div class="login-field">
            <label for="loginPassword">密码</label>
            <input type="password" id="loginPassword" placeholder="输入登录密码" autocomplete="current-password" />
        </div>
        <div class="login-error" id="loginError">密码错误，请重试</div>
        <button class="login-btn" id="loginBtn" onclick="doLogin()">登录</button>
    </div>
</div>

<header>
    <h1>File Viewer</h1>
    <div class="nav-tabs">
        <button class="nav-tab active" id="tabFiles" onclick="switchTab('files')">文件浏览</button>
        <button class="nav-tab" id="tabMonitor" onclick="switchTab('monitor')">系统监控</button>
    </div>
    <button class="logout-btn" onclick="doLogout()">退出登录</button>
</header>

<!-- ============ FILE VIEWER SECTION ============ -->
<div id="sectionFiles">
    <div class="search-bar">
        <input type="text" class="path-input" id="pathInput"
            placeholder="输入文件或目录的绝对路径，如 /etc/nginx/nginx.conf"
            autocomplete="off" spellcheck="false" />
        <button class="btn primary" onclick="loadPath()">查看</button>
        <button class="btn" onclick="goUp()">上级</button>
    </div>

    <div class="quick-paths">
        <span style="font-size:0.8em;color:#8b949e;align-self:center;">快捷：</span>
        <button class="quick-btn" onclick="setPath('/')">/ 根目录</button>
        <button class="quick-btn" onclick="setPath('/etc')">/etc</button>
        <button class="quick-btn" onclick="setPath('/var/log')">/var/log</button>
        <button class="quick-btn" onclick="setPath('/var/www/html')">/var/www/html</button>
        <button class="quick-btn" onclick="setPath('/etc/nginx/nginx.conf')">/etc/nginx/nginx.conf</button>
        <button class="quick-btn" onclick="setPath('/proc/cpuinfo')">/proc/cpuinfo</button>
        <button class="quick-btn" onclick="setPath('/proc/meminfo')">/proc/meminfo</button>
        <button class="quick-btn" onclick="setPath('/etc/passwd')">/etc/passwd</button>
        <button class="quick-btn" onclick="setPath('/etc/hosts')">/etc/hosts</button>
    </div>

    <div class="breadcrumb" id="breadcrumb">
        <span onclick="setPath('/')">/</span>
    </div>

    <div class="content-area" id="contentArea">
        <div class="state-box">
            <div class="state-icon">📂</div>
            <div class="state-title">文件查看器</div>
            <div class="state-msg">在上方输入文件路径，或点击快捷按钮浏览服务器文件</div>
        </div>
    </div>
</div>

<!-- ============ SYSTEM MONITOR SECTION ============ -->
<div id="sectionMonitor" class="section-hidden" style="flex:1;display:flex;flex-direction:column;">
    <div class="monitor-wrap" id="monitorContent">
        <div class="state-box">
            <div class="state-icon">⏳</div>
            <div class="state-title">加载中...</div>
        </div>
    </div>
</div>

<script>
let currentPath = '';
let currentFileData = null;
let currentTab = 'files';
let monitorTimer = null;

// ── Tab Switching ─────────────────────────────────────

function switchTab(tab) {
    currentTab = tab;
    document.getElementById('tabFiles').classList.toggle('active', tab === 'files');
    document.getElementById('tabMonitor').classList.toggle('active', tab === 'monitor');

    const sf = document.getElementById('sectionFiles');
    const sm = document.getElementById('sectionMonitor');

    if (tab === 'files') {
        sf.classList.remove('section-hidden');
        sm.classList.add('section-hidden');
        stopMonitor();
    } else {
        sf.classList.add('section-hidden');
        sm.classList.remove('section-hidden');
        sm.style.display = 'flex';
        startMonitor();
    }
}

// ── Auth ──────────────────────────────────────────────

// 从URL恢复路径
function initFromUrl() {
    if (location.hash && location.hash.length > 1) {
        const path = decodeURIComponent(location.hash.slice(1));
        document.getElementById('pathInput').value = path;
        return true;
    }
    return false;
}

// 监听浏览器后退/前进
window.addEventListener('popstate', (event) => {
    if (event.state && event.state.path) {
        document.getElementById('pathInput').value = event.state.path;
        loadPathWithoutPush();
    }
});

// 不更新历史的加载（用于popstate回调）
async function loadPathWithoutPush() {
    const raw = document.getElementById('pathInput').value.trim();
    if (!raw) return;
    showLoading();
    currentPath = raw;
    buildBreadcrumb(raw);
    try {
        const resp = await fetch('/api/file?path=' + encodeURIComponent(raw));
        const data = await resp.json();
        hideLoading();
        if (!resp.ok) {
            if (resp.status === 401) { showLogin(); return; }
            showError(resp.status, data.error || 'Unknown error', raw);
            return;
        }
        if (data.type === 'directory') renderDir(data);
        else { currentFileData = data; renderFile(data); }
    } catch (e) { hideLoading(); showError(0, '网络错误：' + e.message, raw); }
}

async function checkAuth() {
    try {
        const resp = await fetch('/api/auth/check');
        const data = await resp.json();
        if (data.authenticated) hideLogin();
        else showLogin();
    } catch { showLogin(); }
}

function showLogin() {
    stopMonitor();
    document.getElementById('loginOverlay').classList.add('visible');
    setTimeout(() => document.getElementById('loginPassword').focus(), 50);
}

function hideLogin() {
    document.getElementById('loginOverlay').classList.remove('visible');
    document.getElementById('loginPassword').value = '';
    document.getElementById('loginError').classList.remove('visible');
    // 从URL恢复路径
    if (initFromUrl()) loadPathWithoutPush();
}

async function doLogin() {
    const password = document.getElementById('loginPassword').value;
    if (!password) return;
    const btn = document.getElementById('loginBtn');
    btn.disabled = true;
    btn.textContent = '验证中...';
    try {
        const resp = await fetch('/api/login', {
            method: 'POST',
            headers: { 'Content-Type': 'application/json' },
            body: JSON.stringify({ password }),
        });
        if (resp.ok) hideLogin();
        else {
            document.getElementById('loginError').classList.add('visible');
            document.getElementById('loginPassword').value = '';
            document.getElementById('loginPassword').focus();
        }
    } catch {
        document.getElementById('loginError').textContent = '网络错误，请重试';
        document.getElementById('loginError').classList.add('visible');
    } finally { btn.disabled = false; btn.textContent = '登录'; }
}

async function doLogout() {
    stopMonitor();
    await fetch('/api/logout', { method: 'POST' });
    showLogin();
}

// ── File Viewer ───────────────────────────────────────

function setPath(p) {
    if (currentTab !== 'files') switchTab('files');
    document.getElementById('pathInput').value = p;
    loadPath();
}

function goUp() {
    const p = document.getElementById('pathInput').value.trim() || currentPath;
    if (!p || p === '/') return;
    const parent = p.replace(/\/[^/]+\/?$/, '') || '/';
    setPath(parent);
}

function buildBreadcrumb(path) {
    const bc = document.getElementById('breadcrumb');
    if (!path) { bc.innerHTML = '<span onclick="setPath(\'/\')">~</span>'; return; }
    const parts = path.split('/').filter(Boolean);
    let html = '<span onclick="setPath(\'/\')">root</span>';
    let cur = '';
    for (const part of parts) {
        cur += '/' + part;
        html += '<span class="sep"> / </span>';
        const p = cur;
        html += `<span onclick="setPath('${p.replace(/'/g, "\\'")}')">${escHtml(part)}</span>`;
    }
    bc.innerHTML = html;
}

function escHtml(s) { return s.replace(/&/g,'&amp;').replace(/</g,'&lt;').replace(/>/g,'&gt;'); }

function formatSize(n) {
    if (n == null) return '-';
    if (n < 1024) return n + ' B';
    if (n < 1024*1024) return (n/1024).toFixed(1) + ' KB';
    if (n < 1024*1024*1024) return (n/1024/1024).toFixed(1) + ' MB';
    return (n/1024/1024/1024).toFixed(2) + ' GB';
}

function formatRate(bytesPerSec) {
    if (bytesPerSec < 1024) return bytesPerSec.toFixed(0) + ' B/s';
    if (bytesPerSec < 1024*1024) return (bytesPerSec/1024).toFixed(1) + ' KB/s';
    return (bytesPerSec/1024/1024).toFixed(2) + ' MB/s';
}

function showLoading() { document.getElementById('loadingBar').style.width = '60%'; }
function hideLoading() { const b = document.getElementById('loadingBar'); b.style.width = '100%'; setTimeout(() => { b.style.width = '0'; }, 300); }

async function loadPath() {
    const raw = document.getElementById('pathInput').value.trim();
    if (!raw) return;
    showLoading();
    currentPath = raw;
    buildBreadcrumb(raw);
    try {
        const resp = await fetch('/api/file?path=' + encodeURIComponent(raw));
        const data = await resp.json();
        hideLoading();
        if (!resp.ok) {
            if (resp.status === 401) { showLogin(); return; }
            showError(resp.status, data.error || 'Unknown error', raw);
            return;
        }
        if (data.type === 'directory') renderDir(data);
        else { currentFileData = data; renderFile(data); }
        history.pushState({path: raw}, '', '#' + encodeURIComponent(raw));
    } catch (e) { hideLoading(); showError(0, '网络错误：' + e.message, raw); }
}

function showError(status, msg, path) {
    const icons = { 403: '🔒', 404: '🔍', 413: '📦', 415: '🔢' };
    document.getElementById('contentArea').innerHTML = `
        <div class="state-box">
            <div class="state-icon">${icons[status] || '⚠️'}</div>
            <div class="state-title error">错误 ${status || ''}</div>
            <div class="state-msg">${escHtml(msg)}</div>
            <div class="state-msg" style="color:#484f58;margin-top:4px;font-family:monospace">${escHtml(path)}</div>
        </div>`;
}

function renderDir(data) {
    const entries = data.entries;
    const canWrite = data.folder_permissions && data.folder_permissions.write;
    currentDirPath = data.path;
    currentDirWritable = canWrite;
    
    // 工具栏
    const toolbarHtml = canWrite ? `
    <div class="dir-toolbar">
        <button class="toolbar-btn" onclick="showCreateModal('file')">📄 新建文件</button>
        <button class="toolbar-btn" onclick="showCreateModal('directory')">📁 新建文件夹</button>
        <button class="toolbar-btn" onclick="showUploadModal()">⬆️ 上传文件</button>
    </div>` : '';
    
    if (entries.length === 0) {
        document.getElementById('contentArea').innerHTML = toolbarHtml + `<div class="state-box"><div class="state-icon">📁</div><div class="state-title">空目录</div><div class="state-msg">${escHtml(data.path)}</div></div>`;
        return;
    }
    const rows = entries.map(e => {
        const isDir = e.type === 'dir';
        const fullPath = data.path.replace(/\/$/, '') + '/' + e.name;
        const icon = isDir ? '📁' : getFileIcon(e.name);
        const nameClass = isDir ? 'dir-name' : 'file-name';
        // 权限信息
        const perms = e.permissions || {};
        const modeStr = perms.mode || (isDir ? 'drwxr-xr-x' : '-rw-r--r--');
        const octalStr = perms.octal || (isDir ? '0o755' : '0o644');
        const owner = perms.owner || '-';
        const group = perms.group || '-';
        // 权限可点击
        const permDisplay = `<span class="perm-link" style="font-family:monospace;font-size:0.82em;cursor:pointer;color:#58a6ff" onclick="showChmodModal('${fullPath.replace(/'/g, "\\'")}', '${octalStr}', '${escHtml(e.name)}')">${escHtml(modeStr)}</span>`;
        return `<tr><td><span class="dir-icon">${icon}</span><span class="${nameClass}" onclick="setPath('${fullPath.replace(/'/g, "\\'")}')">${escHtml(e.name)}</span></td><td class="file-size">${isDir ? '-' : formatSize(e.size)}</td><td style="color:#484f58;font-size:0.8em">${isDir ? 'directory' : 'file'}</td><td style="font-family:monospace;font-size:0.8em">${permDisplay}</td><td style="color:#8b949e;font-size:0.8em">${escHtml(owner)}</td></tr>`;
    }).join('');
    document.getElementById('contentArea').innerHTML = toolbarHtml + `<table class="dir-table"><thead><tr><th>名称</th><th style="text-align:right">大小</th><th>类型</th><th>权限</th><th>所有者</th></tr></thead><tbody>${rows}</tbody></table>`;
}

function isMarkdown(path) { return /\.(md|markdown|mdown|mkd)$/i.test(path); }

function renderFile(data, viewMode) {
    const lines = data.content.split('\n');
    if (lines[lines.length - 1] === '') lines.pop();
    const isMd = isMarkdown(data.path);
    if (viewMode === undefined) viewMode = isMd ? 'preview' : 'source';
    
    // 检查是否有写入权限
    const canWrite = data.folder_permissions && data.folder_permissions.write;
    
    // 权限信息显示
    const perms = data.permissions || {};
    const permInfo = perms.mode ? `<span title="Owner: ${perms.owner || '-'}, Group: ${perms.group || '-'}">🔒 ${perms.mode}</span>` : '';
    
    // 编辑按钮
    const editBtn = canWrite ? `<button class="toggle-btn" onclick="enterEditMode()">✏️ 编辑</button>` : '';
    
    const toggleHtml = `<div class="view-toggle">${editBtn}${isMd ? `<button class="toggle-btn ${viewMode === 'preview' ? 'active' : ''}" onclick="renderFile(currentFileData, 'preview')">预览</button><button class="toggle-btn ${viewMode === 'source' ? 'active' : ''}" onclick="renderFile(currentFileData, 'source')">源码</button>` : ''}</div>`;
    
    const headerHtml = `<div class="file-header"><span style="font-family:monospace;color:#c9d1d9">${escHtml(data.path)}</span><div class="file-meta">${toggleHtml}<span>📄 ${lines.length} 行</span><span>💾 ${formatSize(data.size)}</span><span>🔤 ${escHtml(data.encoding)}</span>${permInfo}</div></div>`;
    
    if (isMd && viewMode === 'preview') {
        marked.setOptions({ breaks: true, gfm: true });
        document.getElementById('contentArea').innerHTML = headerHtml + `<div class="md-body">${marked.parse(data.content)}</div>`;
    } else {
        const lineHtml = lines.map((line, i) => `<div class="line"><span class="line-num">${i + 1}</span><span class="line-content">${escHtml(line)}</span></div>`).join('');
        document.getElementById('contentArea').innerHTML = headerHtml + `<pre>${lineHtml}</pre>`;
    }
}

// 编辑模式相关函数
let isEditMode = false;
let originalContent = '';

function enterEditMode() {
    if (!currentFileData) return;
    isEditMode = true;
    originalContent = currentFileData.content;
    
    const canWrite = currentFileData.folder_permissions && currentFileData.folder_permissions.write;
    const perms = currentFileData.permissions || {};
    const permInfo = perms.mode ? `<span title="Owner: ${perms.owner || '-'}">🔒 ${perms.mode}</span>` : '';
    
    const headerHtml = `<div class="file-header">
        <span style="font-family:monospace;color:#c9d1d9">${escHtml(currentFileData.path)}</span>
        <div class="file-meta">
            <div class="view-toggle">
                <button class="toggle-btn" onclick="cancelEdit()">❌ 取消</button>
                <button class="toggle-btn active" style="background:#238636;border-color:#2ea043" onclick="saveFile()">💾 保存</button>
            </div>
            <span>📝 编辑模式</span>
            ${permInfo}
        </div>
    </div>`;
    
    const textareaHtml = `<textarea class="edit-textarea" id="editTextarea">${escHtml(currentFileData.content)}</textarea>`;
    document.getElementById('contentArea').innerHTML = headerHtml + textareaHtml;
}

function cancelEdit() {
    isEditMode = false;
    if (currentFileData) {
        renderFile(currentFileData, 'source');
    }
}

async function saveFile() {
    if (!currentFileData) return;
    
    const textarea = document.getElementById('editTextarea');
    if (!textarea) return;
    
    const newContent = textarea.value;
    
    // 显示保存中状态
    const saveBtn = document.querySelector('.toggle-btn[onclick="saveFile()"]');
    if (saveBtn) {
        saveBtn.textContent = '⏳ 保存中...';
        saveBtn.disabled = true;
    }
    
    try {
        const resp = await fetch('/api/file/save', {
            method: 'POST',
            headers: { 'Content-Type': 'application/json' },
            body: JSON.stringify({
                path: currentFileData.path,
                content: newContent
            })
        });
        
        const result = await resp.json();
        
        if (resp.ok) {
            // 更新当前文件数据
            currentFileData.content = newContent;
            currentFileData.size = result.size;
            isEditMode = false;
            renderFile(currentFileData, 'source');
            showNotification('✅ 文件保存成功', 'success');
        } else {
            showNotification('❌ 保存失败: ' + (result.error || 'Unknown error'), 'error');
            // 恢复按钮状态
            if (saveBtn) {
                saveBtn.textContent = '💾 保存';
                saveBtn.disabled = false;
            }
        }
    } catch (e) {
        showNotification('❌ 保存失败: ' + e.message, 'error');
        if (saveBtn) {
            saveBtn.textContent = '💾 保存';
            saveBtn.disabled = false;
        }
    }
}

function showNotification(msg, type) {
    const colors = {
        success: 'background:#238636;border-color:#2ea043',
        error: 'background:#da3633;border-color:#f85149',
        info: 'background:#1f6feb;border-color:#388bfd'
    };
    const notification = document.createElement('div');
    notification.className = 'notification';
    notification.style.cssText = `position:fixed;top:20px;right:20px;padding:12px 20px;border-radius:6px;color:#fff;font-size:0.9em;z-index:1000;${colors[type] || colors.info}`;
    notification.textContent = msg;
    document.body.appendChild(notification);
    setTimeout(() => notification.remove(), 3000);
}

// 当前目录状态
let currentDirPath = '';
let currentDirWritable = false;
let chmodTargetPath = '';
let chmodTargetName = '';

// ── 模态框 ──
function openModal() {
    document.getElementById('modalOverlay').classList.add('visible');
}

function closeModal(e) {
    if (e && e.target !== e.currentTarget) return;
    document.getElementById('modalOverlay').classList.remove('visible');
}

// ── 新建文件/文件夹 ──
function showCreateModal(type) {
    const title = type === 'file' ? '新建文件' : '新建文件夹';
    document.getElementById('modalTitle').textContent = title;
    document.getElementById('modalContent').innerHTML = `
        <div class="modal-field">
            <label>名称</label>
            <input type="text" id="createName" placeholder="${type === 'file' ? 'filename.txt' : 'folder_name'}" autofocus />
        </div>
        <div class="modal-field">
            <label>位置</label>
            <input type="text" id="createParent" value="${escHtml(currentDirPath)}" readonly />
        </div>
        <div class="modal-actions">
            <button class="modal-btn modal-btn-cancel" onclick="closeModal()">取消</button>
            <button class="modal-btn modal-btn-primary" onclick="doCreate('${type}')">创建</button>
        </div>
    `;
    openModal();
    setTimeout(() => document.getElementById('createName').focus(), 100);
}

async function doCreate(type) {
    const name = document.getElementById('createName').value.trim();
    const parent = document.getElementById('createParent').value;
    
    if (!name) {
        showNotification('请输入名称', 'error');
        return;
    }
    
    try {
        const resp = await fetch('/api/file/create', {
            method: 'POST',
            headers: { 'Content-Type': 'application/json' },
            body: JSON.stringify({ parent, name, type })
        });
        
        const result = await resp.json();
        
        if (resp.ok) {
            closeModal();
            showNotification(`✅ ${type === 'file' ? '文件' : '文件夹'}创建成功`, 'success');
            // 刷新当前目录
            document.getElementById('pathInput').value = currentDirPath;
            loadPathWithoutPush();
        } else {
            showNotification('❌ ' + (result.error || '创建失败'), 'error');
        }
    } catch (e) {
        showNotification('❌ 创建失败: ' + e.message, 'error');
    }
}

// ── 修改权限 ──
function showChmodModal(path, octal, name) {
    if (!currentDirWritable) {
        showNotification('❌ 当前目录无写入权限', 'error');
        return;
    }
    
    chmodTargetPath = path;
    chmodTargetName = name;
    
    // 解析当前权限
    const mode = parseInt(octal, 8);
    const u = (mode >> 6) & 7;
    const g = (mode >> 3) & 7;
    const o = mode & 7;
    
    document.getElementById('modalTitle').textContent = '修改权限: ' + name;
    document.getElementById('modalContent').innerHTML = `
        <div class="perm-grid">
            <div class="perm-check">
                <label>所有者</label>
                <div style="display:flex;gap:8px">
                    <label style="font-size:0.75em">读<input type="checkbox" id="ur" ${u & 4 ? 'checked' : ''}></label>
                    <label style="font-size:0.75em">写<input type="checkbox" id="uw" ${u & 2 ? 'checked' : ''}></label>
                    <label style="font-size:0.75em">执<input type="checkbox" id="ux" ${u & 1 ? 'checked' : ''}></label>
                </div>
            </div>
            <div class="perm-check">
                <label>组</label>
                <div style="display:flex;gap:8px">
                    <label style="font-size:0.75em">读<input type="checkbox" id="gr" ${g & 4 ? 'checked' : ''}></label>
                    <label style="font-size:0.75em">写<input type="checkbox" id="gw" ${g & 2 ? 'checked' : ''}></label>
                    <label style="font-size:0.75em">执<input type="checkbox" id="gx" ${g & 1 ? 'checked' : ''}></label>
                </div>
            </div>
            <div class="perm-check">
                <label>其他</label>
                <div style="display:flex;gap:8px">
                    <label style="font-size:0.75em">读<input type="checkbox" id="or" ${o & 4 ? 'checked' : ''}></label>
                    <label style="font-size:0.75em">写<input type="checkbox" id="ow" ${o & 2 ? 'checked' : ''}></label>
                    <label style="font-size:0.75em">执<input type="checkbox" id="ox" ${o & 1 ? 'checked' : ''}></label>
                </div>
            </div>
        </div>
        <div class="modal-field">
            <label>八进制</label>
            <input type="text" id="chmodOctal" value="${octal}" readonly style="font-family:monospace" />
        </div>
        <div class="modal-field">
            <label>路径</label>
            <input type="text" value="${escHtml(path)}" readonly />
        </div>
        <div class="modal-actions">
            <button class="modal-btn modal-btn-cancel" onclick="closeModal()">取消</button>
            <button class="modal-btn modal-btn-primary" onclick="doChmod()">修改</button>
        </div>
    `;
    
    // 绑定复选框事件，实时更新八进制值
    const cbs = ['ur','uw','ux','gr','gw','gx','or','ow','ox'];
    cbs.forEach(id => {
        document.getElementById(id).addEventListener('change', updateOctalDisplay);
    });
    
    openModal();
}

function updateOctalDisplay() {
    const u = (document.getElementById('ur').checked ? 4 : 0) + (document.getElementById('uw').checked ? 2 : 0) + (document.getElementById('ux').checked ? 1 : 0);
    const g = (document.getElementById('gr').checked ? 4 : 0) + (document.getElementById('gw').checked ? 2 : 0) + (document.getElementById('gx').checked ? 1 : 0);
    const o = (document.getElementById('or').checked ? 4 : 0) + (document.getElementById('ow').checked ? 2 : 0) + (document.getElementById('ox').checked ? 1 : 0);
    document.getElementById('chmodOctal').value = '0o' + u.toString() + g.toString() + o.toString();
}

async function doChmod() {
    const mode = document.getElementById('chmodOctal').value;
    
    try {
        const resp = await fetch('/api/file/chmod', {
            method: 'POST',
            headers: { 'Content-Type': 'application/json' },
            body: JSON.stringify({ path: chmodTargetPath, mode })
        });
        
        const result = await resp.json();
        
        if (resp.ok) {
            closeModal();
            showNotification('✅ 权限修改成功', 'success');
            // 刷新当前目录
            document.getElementById('pathInput').value = currentDirPath;
            loadPathWithoutPush();
        } else {
            showNotification('❌ ' + (result.error || '修改失败'), 'error');
        }
    } catch (e) {
        showNotification('❌ 修改失败: ' + e.message, 'error');
    }
}

// ── 上传文件 ──
function showUploadModal() {
    document.getElementById('modalTitle').textContent = '上传文件';
    document.getElementById('modalContent').innerHTML = `
        <div class="modal-field">
            <label>目标目录</label>
            <input type="text" value="${escHtml(currentDirPath)}" readonly />
        </div>
        <div class="upload-zone" id="uploadZone" onclick="document.getElementById('fileInput').click()">
            <input type="file" id="fileInput" multiple onchange="handleFileSelect(event)">
            <div style="font-size:2em;margin-bottom:10px">📁</div>
            <div style="color:#8b949e">点击或拖拽文件到此处上传</div>
            <div id="selectedFiles" style="margin-top:10px;font-size:0.85em;color:#58a6ff"></div>
        </div>
        <div class="modal-actions">
            <button class="modal-btn modal-btn-cancel" onclick="closeModal()">取消</button>
            <button class="modal-btn modal-btn-primary" onclick="doUpload()">上传</button>
        </div>
    `;
    
    // 拖拽支持
    const zone = document.getElementById('uploadZone');
    zone.addEventListener('dragover', (e) => { e.preventDefault(); zone.classList.add('dragover'); });
    zone.addEventListener('dragleave', () => zone.classList.remove('dragover'));
    zone.addEventListener('drop', (e) => {
        e.preventDefault();
        zone.classList.remove('dragover');
        document.getElementById('fileInput').files = e.dataTransfer.files;
        handleFileSelect({ target: { files: e.dataTransfer.files } });
    });
    
    openModal();
}

let selectedFilesList = [];

function handleFileSelect(event) {
    selectedFilesList = Array.from(event.target.files);
    const names = selectedFilesList.map(f => f.name).join(', ');
    document.getElementById('selectedFiles').textContent = selectedFilesList.length > 0 
        ? `已选择 ${selectedFilesList.length} 个文件: ${names}` 
        : '';
}

async function doUpload() {
    if (selectedFilesList.length === 0) {
        showNotification('请选择文件', 'error');
        return;
    }
    
    let successCount = 0;
    let errorCount = 0;
    
    for (const file of selectedFilesList) {
        const formData = new FormData();
        formData.append('file', file);
        formData.append('path', currentDirPath);
        
        try {
            const resp = await fetch('/api/file/upload', {
                method: 'POST',
                body: formData
            });
            
            const result = await resp.json();
            
            if (resp.ok) {
                successCount++;
            } else {
                errorCount++;
                console.error('Upload error:', result.error);
            }
        } catch (e) {
            errorCount++;
            console.error('Upload error:', e.message);
        }
    }
    
    closeModal();
    
    if (successCount > 0) {
        showNotification(`✅ 成功上传 ${successCount} 个文件`, 'success');
        // 刷新当前目录
        document.getElementById('pathInput').value = currentDirPath;
        loadPathWithoutPush();
    }
    
    if (errorCount > 0) {
        showNotification(`⚠️ ${errorCount} 个文件上传失败`, 'error');
    }
}

function getFileIcon(name) {
    const ext = name.split('.').pop().toLowerCase();
    const map = { js:'📜',ts:'📜',py:'🐍',sh:'⚙️',bash:'⚙️',html:'🌐',htm:'🌐',css:'🎨',json:'📋',yaml:'📋',yml:'📋',toml:'📋',ini:'📋',conf:'📋',cfg:'📋',txt:'📝',md:'📑',markdown:'📑',log:'📃',jpg:'🖼️',jpeg:'🖼️',png:'🖼️',gif:'🖼️',svg:'🖼️',webp:'🖼️',zip:'📦',tar:'📦',gz:'📦',bz2:'📦',pdf:'📕',doc:'📘',docx:'📘',key:'🔑',pem:'🔑',crt:'🔑' };
    return map[ext] || '📄';
}

// ── System Monitor ────────────────────────────────────

function startMonitor() {
    if (monitorTimer) return;
    fetchSystemInfo();
    monitorTimer = setInterval(fetchSystemInfo, 3000);
}

function stopMonitor() {
    if (monitorTimer) { clearInterval(monitorTimer); monitorTimer = null; }
}

// 页面不可见时停止刷新，节省资源
document.addEventListener('visibilitychange', () => {
    if (document.hidden && currentTab === 'monitor') {
        stopMonitor();
    } else if (!document.hidden && currentTab === 'monitor') {
        startMonitor();
    }
});

async function fetchSystemInfo() {
    try {
        const resp = await fetch('/api/system');
        if (resp.status === 401) { showLogin(); return; }
        const d = await resp.json();
        renderMonitor(d);
    } catch (e) {
        document.getElementById('monitorContent').innerHTML = `<div class="state-box"><div class="state-icon">⚠️</div><div class="state-title error">无法获取系统信息</div><div class="state-msg">${escHtml(e.message)}</div></div>`;
    }
}

function pbarClass(pct) {
    if (pct < 60) return 'pbar-green';
    if (pct < 85) return 'pbar-yellow';
    return 'pbar-red';
}

function renderMonitor(d) {
    const cpu = d.cpu || {};
    const mem = d.memory || {};
    const net = d.network || {};
    const load = d.load || {};
    const procs = d.processes || [];
    const disks = d.disks || [];

    const now = new Date().toLocaleTimeString('zh-CN', { hour12: false });

    let html = `
    <div class="mon-header">
        <h2>${escHtml(d.hostname || 'Server')}</h2>
        <div class="mon-meta">
            <span class="mon-live"><span class="mon-live-dot"></span> 实时</span>
            <span>更新于 ${now}</span>
            <span>每 3 秒刷新</span>
        </div>
    </div>
    <div class="mon-grid">`;

    // ── OS Info Card ──
    html += `
    <div class="mon-card">
        <div class="mon-card-title">🖥️ 系统信息</div>
        <div class="mon-row"><span class="label">操作系统</span><span class="val">${escHtml(d.os || '')}</span></div>
        <div class="mon-row"><span class="label">内核</span><span class="val">${escHtml(d.kernel || '')}</span></div>
        <div class="mon-row"><span class="label">运行时间</span><span class="val">${escHtml(d.uptime || '')}</span></div>
        ${d.temperature != null ? `<div class="mon-row"><span class="label">温度</span><span class="val">${d.temperature} &#8451;</span></div>` : ''}
    </div>`;

    // ── CPU Card ──
    const cpuPct = cpu.usage_percent || 0;
    html += `
    <div class="mon-card">
        <div class="mon-card-title">⚡ CPU</div>
        <div class="mon-big-num">${cpuPct.toFixed(1)}%</div>
        <div class="pbar-wrap"><div class="pbar ${pbarClass(cpuPct)}" style="width:${cpuPct}%"></div></div>
        <div class="mon-row"><span class="label">型号</span><span class="val" style="font-size:0.78em">${escHtml(cpu.model || '')}</span></div>
        <div class="mon-row"><span class="label">核心 / 线程</span><span class="val">${cpu.physical_cores || '-'} / ${cpu.threads || '-'}</span></div>
        <div class="mon-row"><span class="label">负载 (1/5/15m)</span><span class="val">${load['1m']?.toFixed(2)} / ${load['5m']?.toFixed(2)} / ${load['15m']?.toFixed(2)}</span></div>
    </div>`;

    // ── Memory Card ──
    const memPct = mem.usage_percent || 0;
    html += `
    <div class="mon-card">
        <div class="mon-card-title">🧠 内存</div>
        <div class="mon-big-num">${memPct.toFixed(1)}%</div>
        <div class="pbar-wrap"><div class="pbar ${pbarClass(memPct)}" style="width:${memPct}%"></div></div>
        <div class="mon-row"><span class="label">已使用 / 总计</span><span class="val">${formatSize(mem.used)} / ${formatSize(mem.total)}</span></div>
        <div class="mon-row"><span class="label">可用</span><span class="val">${formatSize(mem.available)}</span></div>
        <div class="mon-row"><span class="label">缓存 (Buffers+Cache)</span><span class="val">${formatSize((mem.buffers||0)+(mem.cached||0))}</span></div>
        ${mem.swap_total > 0 ? `<div class="mon-row"><span class="label">Swap</span><span class="val">${formatSize(mem.swap_used)} / ${formatSize(mem.swap_total)} (${mem.swap_percent}%)</span></div>` : ''}
    </div>`;

    // ── Network Card ──
    html += `
    <div class="mon-card">
        <div class="mon-card-title">🌐 网络</div>
        <div class="net-pair">
            <div><div class="net-rate" style="color:#4ade80">↓ ${formatRate(net.rx_rate || 0)}</div><div class="net-label">下行速率</div></div>
            <div><div class="net-rate" style="color:#58a6ff">↑ ${formatRate(net.tx_rate || 0)}</div><div class="net-label">上行速率</div></div>
        </div>`;
    (net.interfaces || []).forEach(iface => {
        html += `<div class="mon-row"><span class="label">${escHtml(iface.name)} <span style="color:#484f58">${escHtml(iface.ip)}</span></span><span class="val">↓${formatSize(iface.rx_bytes)} ↑${formatSize(iface.tx_bytes)}</span></div>`;
    });
    html += `</div>`;

    // ── Disk Card ──
    html += `<div class="mon-card">
        <div class="mon-card-title">💾 磁盘</div>`;
    disks.forEach(dk => {
        const dkPct = dk.usage_percent || 0;
        html += `
        <div class="disk-item">
            <div style="display:flex;justify-content:space-between;align-items:baseline">
                <span class="disk-mount">${escHtml(dk.mount)}</span>
                <span style="font-family:monospace;font-size:0.88em;color:#e6edf3">${dkPct}%</span>
            </div>
            <div class="disk-device">${escHtml(dk.device)}</div>
            <div class="pbar-wrap"><div class="pbar ${pbarClass(dkPct)}" style="width:${dkPct}%"></div></div>
            <div class="disk-detail"><span>${formatSize(dk.used)} 已用</span><span>${formatSize(dk.available)} 可用</span><span>${formatSize(dk.total)} 总计</span></div>
        </div>`;
    });
    html += `</div>`;

    // ── Process Card ──
    if (procs.length > 0) {
        html += `<div class="mon-card wide">
            <div class="mon-card-title">📊 进程 (Top 10 by CPU)</div>
            <table class="proc-table"><thead><tr><th>PID</th><th>用户</th><th>CPU%</th><th>内存%</th><th>命令</th></tr></thead><tbody>`;
        procs.forEach(p => {
            html += `<tr><td>${p.pid}</td><td>${escHtml(p.user)}</td><td>${p.cpu.toFixed(1)}</td><td>${p.mem.toFixed(1)}</td><td style="max-width:400px;overflow:hidden;text-overflow:ellipsis;white-space:nowrap">${escHtml(p.command)}</td></tr>`;
        });
        html += `</tbody></table></div>`;
    }

    html += `</div>`; // close mon-grid

    document.getElementById('monitorContent').innerHTML = html;
}

// ── Init ──────────────────────────────────────────────

document.getElementById('pathInput').addEventListener('keydown', e => { if (e.key === 'Enter') loadPath(); });
document.getElementById('loginPassword').addEventListener('keydown', e => { if (e.key === 'Enter') doLogin(); });
checkAuth();
</script>

            <h3 id="modalTitle">标题</h3>

        <div id="modalContent" class="modal-content"></div>
    </div>
