<!DOCTYPE html>
<html lang="zh-CN">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>File Viewer</title>
    <script src="https://cdn.jsdelivr.net/npm/marked@12/marked.min.js"></script>
    <style>
        * { margin: 0; padding: 0; box-sizing: border-box; }

        body {
            font-family: 'Segoe UI', 'PingFang SC', 'Microsoft YaHei', monospace;
            background: #0d1117;
            color: #c9d1d9;
            height: 100vh;
            display: flex;
            flex-direction: column;
        }

        header {
            background: #161b22;
            border-bottom: 1px solid #30363d;
            padding: 14px 24px;
            display: flex;
            align-items: center;
            gap: 12px;
            flex-shrink: 0;
        }

        header h1 {
            font-size: 1.1em;
            color: #58a6ff;
            font-weight: 600;
            letter-spacing: 0.5px;
        }

        .tag {
            font-size: 0.7em;
            background: #21262d;
            color: #8b949e;
            padding: 2px 8px;
            border-radius: 12px;
            border: 1px solid #30363d;
        }

        /* ── Nav Tabs ── */
        .nav-tabs {
            display: flex;
            gap: 2px;
            margin-left: 16px;
        }

        .nav-tab {
            background: none;
            border: none;
            color: #8b949e;
            padding: 6px 14px;
            font-size: 0.88em;
            cursor: pointer;
            border-radius: 6px;
            transition: all 0.15s;
        }

        .nav-tab:hover { color: #c9d1d9; background: #21262d; }
        .nav-tab.active { color: #58a6ff; background: #21262d; font-weight: 600; }

        /* ── Common ── */
        .search-bar {
            background: #161b22;
            border-bottom: 1px solid #30363d;
            padding: 12px 24px;
            display: flex;
            gap: 8px;
            flex-shrink: 0;
        }

        .path-input {
            flex: 1;
            background: #0d1117;
            border: 1px solid #30363d;
            border-radius: 6px;
            padding: 8px 14px;
            color: #c9d1d9;
            font-family: 'Cascadia Code', 'Fira Code', 'Consolas', monospace;
            font-size: 0.95em;
            outline: none;
            transition: border-color 0.2s;
        }

        .path-input:focus {
            border-color: #58a6ff;
            box-shadow: 0 0 0 3px rgba(88, 166, 255, 0.1);
        }

        .btn {
            background: #21262d;
            color: #c9d1d9;
            border: 1px solid #30363d;
            border-radius: 6px;
            padding: 8px 18px;
            cursor: pointer;
            font-size: 0.9em;
            transition: background 0.15s, border-color 0.15s;
            white-space: nowrap;
        }

        .btn:hover { background: #30363d; border-color: #8b949e; }
        .btn.primary { background: #1f6feb; border-color: #388bfd; color: #fff; }
        .btn.primary:hover { background: #388bfd; }
        .btn.danger { background: #da3633; border-color: #f85149; color: #fff; }
        .btn.danger:hover { background: #f85149; }
        .btn.success { background: #238636; border-color: #2ea043; color: #fff; }
        .btn.success:hover { background: #2ea043; }

        .quick-paths {
            background: #161b22;
            border-bottom: 1px solid #30363d;
            padding: 6px 24px;
            display: flex;
            gap: 6px;
            flex-wrap: wrap;
            flex-shrink: 0;
        }

        .quick-btn {
            background: #21262d;
            border: 1px solid #30363d;
            color: #8b949e;
            padding: 3px 10px;
            border-radius: 4px;
            font-size: 0.8em;
            cursor: pointer;
            font-family: monospace;
            transition: all 0.15s;
        }

        .quick-btn:hover { color: #58a6ff; border-color: #58a6ff; background: #0d1117; }

        .breadcrumb {
            padding: 8px 24px;
            font-size: 0.85em;
            color: #8b949e;
            background: #0d1117;
            border-bottom: 1px solid #21262d;
            min-height: 34px;
            display: flex;
            align-items: center;
            gap: 4px;
            flex-shrink: 0;
            flex-wrap: wrap;
        }

        .breadcrumb span { color: #58a6ff; cursor: pointer; }
        .breadcrumb span:hover { text-decoration: underline; }
        .breadcrumb .sep { color: #30363d; }

        .content-area {
            flex: 1;
            overflow: auto;
            padding: 0;
        }

        .file-header {
            display: flex;
            justify-content: space-between;
            align-items: center;
            padding: 10px 24px;
            background: #161b22;
            border-bottom: 1px solid #30363d;
            font-size: 0.85em;
            color: #8b949e;
            position: sticky;
            top: 0;
            z-index: 10;
        }

        .file-meta { display: flex; gap: 16px; }
        .file-meta span { display: flex; align-items: center; gap: 4px; }

        pre {
            padding: 16px 24px;
            font-family: 'Cascadia Code', 'Fira Code', 'Consolas', 'Monaco', monospace;
            font-size: 0.88em;
            line-height: 1.6;
            color: #e6edf3;
            white-space: pre-wrap;
            word-break: break-all;
            tab-size: 4;
            counter-reset: line;
        }

        .line { display: flex; gap: 0; }
        .line-num { user-select: none; color: #484f58; min-width: 44px; text-align: right; padding-right: 16px; flex-shrink: 0; }
        .line-content { flex: 1; }

        .dir-table { width: 100%; border-collapse: collapse; }
        .dir-table th { background: #161b22; padding: 10px 12px; text-align: left; font-size: 0.85em; color: #8b949e; font-weight: 500; border-bottom: 1px solid #30363d; position: sticky; top: 0; }
        .dir-table td { padding: 8px 12px; border-bottom: 1px solid #21262d; font-size: 0.9em; }
        .dir-table tr:hover td { background: #161b22; }
        .dir-icon { margin-right: 8px; }
        .dir-name { color: #58a6ff; cursor: pointer; }
        .dir-name:hover { text-decoration: underline; }
        .file-name { color: #c9d1d9; cursor: pointer; }
        .file-name:hover { color: #58a6ff; text-decoration: underline; }
        .file-size { color: #8b949e; text-align: right; font-size: 0.85em; }

        .state-box { display: flex; flex-direction: column; align-items: center; justify-content: center; padding: 80px 24px; gap: 12px; color: #8b949e; }
        .state-icon { font-size: 3em; }
        .state-title { font-size: 1.1em; color: #c9d1d9; }
        .state-msg { font-size: 0.9em; max-width: 400px; text-align: center; }
        .error { color: #f85149; }

        .loading-bar { height: 2px; background: #58a6ff; width: 0; transition: width 0.3s; position: fixed; top: 0; left: 0; z-index: 100; }

        .view-toggle { display: flex; gap: 4px; }
        .toggle-btn { background: #21262d; border: 1px solid #30363d; color: #c9d1d9; padding: 4px 12px; border-radius: 6px; font-size: 0.82em; cursor: pointer; transition: all 0.15s; }
        .toggle-btn:hover { background: #30363d; border-color: #8b949e; }
        .toggle-btn.active { background: #1f6feb; border-color: #388bfd; color: #fff; }

        /* ── Markdown ── */
        .md-body { padding: 32px 48px; max-width: 860px; margin: 0 auto; font-family: 'Segoe UI', 'PingFang SC', 'Microsoft YaHei', sans-serif; font-size: 0.95em; line-height: 1.75; color: #e6edf3; overflow-x: hidden; }
        .md-body h1, .md-body h2, .md-body h3, .md-body h4, .md-body h5, .md-body h6 { color: #e6edf3; margin: 1.5em 0 0.5em; font-weight: 600; line-height: 1.3; }
        .md-body h1 { font-size: 2em; border-bottom: 1px solid #30363d; padding-bottom: 0.3em; }
        .md-body h2 { font-size: 1.5em; border-bottom: 1px solid #21262d; padding-bottom: 0.25em; }
        .md-body h3 { font-size: 1.25em; }
        .md-body p { margin: 0.75em 0; overflow-wrap: break-word; word-wrap: break-word; }
        .md-body a { color: #58a6ff; text-decoration: none; }
        .md-body a:hover { text-decoration: underline; }
        .md-body code { font-family: 'Cascadia Code', 'Fira Code', 'Consolas', monospace; font-size: 0.88em; background: #21262d; border: 1px solid #30363d; border-radius: 4px; padding: 0.15em 0.4em; color: #e6edf3; word-break: break-all; }
        .md-body pre { background: #161b22; border: 1px solid #30363d; border-radius: 6px; padding: 16px 20px; overflow-x: auto; margin: 1em 0; white-space: pre; word-break: normal; counter-reset: none; max-width: 100%; }
        .md-body pre code { background: none; border: none; padding: 0; font-size: 0.87em; color: #e6edf3; }
        .md-body blockquote { border-left: 4px solid #30363d; margin: 1em 0; padding: 0.5em 1em; color: #8b949e; background: #161b22; border-radius: 0 4px 4px 0; }
        .md-body blockquote p { margin: 0; }
        .md-body ul, .md-body ol { padding-left: 2em; margin: 0.75em 0; }
        .md-body li { margin: 0.3em 0; }
        .md-body .table-wrap { overflow-x: auto; margin: 1em 0; max-width: 100%; }
        .md-body table { border-collapse: collapse; width: 100%; margin: 0; font-size: 0.9em; display: block; max-width: fit-content; }
        .md-body th { background: #161b22; color: #c9d1d9; font-weight: 600; padding: 8px 12px; border: 1px solid #30363d; text-align: left; white-space: nowrap; }
        .md-body td { padding: 7px 12px; border: 1px solid #21262d; white-space: pre-wrap; word-break: break-word; max-width: 400px; }
        .md-body tr:nth-child(even) td { background: #161b22; }
        .md-body hr { border: none; border-top: 1px solid #30363d; margin: 2em 0; }
        .md-body img { max-width: 100%; border-radius: 6px; }
        .md-body input[type="checkbox"] { margin-right: 6px; accent-color: #58a6ff; }

        /* ── Login ── */
        #loginOverlay { display: none; position: fixed; inset: 0; background: #0d1117; z-index: 1000; justify-content: center; align-items: center; }
        #loginOverlay.visible { display: flex; }
        .login-card { background: #161b22; border: 1px solid #30363d; border-radius: 12px; padding: 40px 36px; width: 340px; display: flex; flex-direction: column; gap: 20px; }
        .login-card h2 { font-size: 1.3em; color: #e6edf3; text-align: center; font-weight: 600; }
        .login-card .subtitle { text-align: center; font-size: 0.85em; color: #8b949e; margin-top: -12px; }
        .login-field { display: flex; flex-direction: column; gap: 6px; }
        .login-field label { font-size: 0.85em; color: #8b949e; }
        .login-field input { background: #0d1117; border: 1px solid #30363d; border-radius: 6px; padding: 10px 14px; color: #e6edf3; font-size: 0.95em; outline: none; transition: border-color 0.2s; }
        .login-field input:focus { border-color: #58a6ff; box-shadow: 0 0 0 3px rgba(88, 166, 255, 0.1); }
        .login-btn { background: #1f6feb; border: 1px solid #388bfd; border-radius: 6px; color: #fff; padding: 10px; font-size: 0.95em; font-weight: 600; cursor: pointer; transition: background 0.15s; }
        .login-btn:hover { background: #388bfd; }
        .login-btn:disabled { background: #21262d; border-color: #30363d; color: #484f58; cursor: not-allowed; }
        .login-error { display: none; background: rgba(248, 81, 73, 0.1); border: 1px solid rgba(248, 81, 73, 0.4); border-radius: 6px; padding: 8px 12px; font-size: 0.85em; color: #f85149; text-align: center; }
        .login-error.visible { display: block; }

        .settings-btn { margin-left: auto; background: none; border: 1px solid #30363d; border-radius: 6px; color: #8b949e; padding: 4px 12px; font-size: 0.82em; cursor: pointer; transition: all 0.15s; }
        .settings-btn:hover { color: #58a6ff; border-color: #58a6ff; }
        .logout-btn { background: none; border: 1px solid #30363d; border-radius: 6px; color: #8b949e; padding: 4px 12px; font-size: 0.82em; cursor: pointer; transition: all 0.15s; }
        .logout-btn:hover { color: #f85149; border-color: #f85149; }

        /* ── System Monitor Dashboard ── */
        .monitor-wrap { padding: 24px; overflow-y: auto; flex: 1; }
        .mon-header { display: flex; justify-content: space-between; align-items: center; margin-bottom: 20px; }
        .mon-header h2 { font-size: 1.15em; color: #e6edf3; font-weight: 600; }
        .mon-meta { font-size: 0.8em; color: #484f58; display: flex; gap: 16px; align-items: center; }
        .mon-live { display: inline-flex; align-items: center; gap: 5px; color: #4ade80; font-size: 0.82em; }
        .mon-live-dot { width: 6px; height: 6px; background: #4ade80; border-radius: 50%; animation: pulse 2s infinite; }
        @keyframes pulse { 0%, 100% { opacity: 1; } 50% { opacity: 0.3; } }
        .mon-grid { display: grid; grid-template-columns: repeat(auto-fill, minmax(340px, 1fr)); gap: 16px; }
        .mon-card { background: #161b22; border: 1px solid #30363d; border-radius: 10px; padding: 20px; }
        .mon-card-title { font-size: 0.82em; color: #8b949e; text-transform: uppercase; letter-spacing: 0.8px; margin-bottom: 14px; display: flex; align-items: center; gap: 6px; }
        .mon-big-num { font-size: 2em; font-weight: 700; color: #e6edf3; line-height: 1; margin-bottom: 4px; font-family: 'Cascadia Code', 'Fira Code', monospace; }
        .mon-sub { font-size: 0.82em; color: #484f58; }
        .pbar-wrap { background: #21262d; border-radius: 4px; height: 8px; margin: 10px 0 6px; overflow: hidden; }
        .pbar { height: 100%; border-radius: 4px; transition: width 0.6s ease; }
        .pbar-green { background: #4ade80; }
        .pbar-yellow { background: #facc15; }
        .pbar-red { background: #f85149; }
        .mon-row { display: flex; justify-content: space-between; padding: 5px 0; font-size: 0.88em; border-bottom: 1px solid #21262d; }
        .mon-row:last-child { border-bottom: none; }
        .mon-row .label { color: #8b949e; }
        .mon-row .val { color: #e6edf3; font-family: monospace; }
        .disk-item { margin-bottom: 12px; }
        .disk-item:last-child { margin-bottom: 0; }
        .disk-mount { font-family: monospace; font-size: 0.88em; color: #58a6ff; }
        .disk-device { font-size: 0.78em; color: #484f58; }
        .disk-detail { display: flex; justify-content: space-between; font-size: 0.82em; color: #8b949e; margin-top: 2px; }
        .net-rate { font-size: 1.4em; font-weight: 600; color: #e6edf3; font-family: monospace; }
        .net-label { font-size: 0.78em; color: #8b949e; margin-top: 2px; }
        .net-pair { display: flex; gap: 32px; margin-bottom: 12px; }
        .proc-table { width: 100%; border-collapse: collapse; font-size: 0.82em; }
        .proc-table th { color: #8b949e; font-weight: 500; text-align: left; padding: 4px 8px; border-bottom: 1px solid #30363d; }
        .proc-table td { padding: 4px 8px; border-bottom: 1px solid #21262d; color: #c9d1d9; font-family: monospace; }
        .proc-table tr:hover td { background: #0d1117; }
        .mon-card.wide { grid-column: 1 / -1; }
        .section-hidden { display: none !important; }
        
        /* Edit Textarea */
        .edit-textarea {
            width: 100%;
            min-height: calc(100vh - 200px);
            background: #0d1117;
            border: none;
            padding: 16px 24px;
            font-family: 'Cascadia Code', 'Fira Code', 'Consolas', 'Monaco', monospace;
            font-size: 0.88em;
            line-height: 1.6;
            color: #e6edf3;
            resize: vertical;
            outline: none;
            tab-size: 4;
            white-space: pre;
            overflow-x: auto;
        }
        .edit-textarea:focus { box-shadow: inset 0 0 0 1px #30363d; }
        .perm-indicator { display: inline-flex; align-items: center; gap: 4px; padding: 2px 8px; background: #21262d; border-radius: 4px; font-size: 0.8em; }
        .perm-readonly { color: #f85149; }
        .perm-readwrite { color: #4ade80; }
        
        /* Toolbar */
        .dir-toolbar { background: #161b22; border-bottom: 1px solid #30363d; padding: 10px 20px; display: flex; gap: 8px; align-items: center; flex-wrap: wrap; }
        .toolbar-btn { background: #21262d; border: 1px solid #30363d; color: #c9d1d9; padding: 6px 12px; border-radius: 6px; font-size: 0.85em; cursor: pointer; transition: all 0.15s; display: inline-flex; align-items: center; gap: 4px; }
        .toolbar-btn:hover { background: #30363d; border-color: #8b949e; }
        .toolbar-btn:disabled { opacity: 0.4; cursor: not-allowed; }
        .toolbar-btn.icon-only { padding: 6px 10px; }
        .toolbar-btn.btn-download { background: rgba(35, 134, 54, 0.15); border-color: #238636; color: #3fb950; }
        .toolbar-btn.btn-download:hover { background: rgba(35, 134, 54, 0.25); }
        .toolbar-btn.btn-download:disabled { background: #21262d; border-color: #30363d; color: #484f58; }
        .toolbar-btn.btn-delete { background: rgba(248, 81, 73, 0.1); border-color: rgba(248, 81, 73, 0.4); color: #f85149; }
        .toolbar-btn.btn-delete:hover { background: rgba(248, 81, 73, 0.2); }
        .toolbar-btn.btn-delete:disabled { background: #21262d; border-color: #30363d; color: #484f58; }
        .perm-link:hover { text-decoration: underline; }
        .selection-info { color: #58a6ff; font-size: 0.85em; margin-left: auto; background: rgba(88, 166, 255, 0.1); padding: 4px 10px; border-radius: 4px; }
        
        /* Checkbox */
        /* Checkbox - 自定义样式 */
        .checkbox-cell { width: 40px; text-align: center; vertical-align: middle; }
        .checkbox-cell input[type="checkbox"] {
            appearance: none;
            -webkit-appearance: none;
            width: 20px;
            height: 20px;
            border: 2px solid #484f58;
            border-radius: 6px;
            background: #21262d;
            cursor: pointer;
            position: relative;
            transition: all 0.2s cubic-bezier(0.4, 0, 0.2, 1);
            vertical-align: middle;
        }
        .checkbox-cell input[type="checkbox"]:hover {
            border-color: #58a6ff;
            box-shadow: 0 0 0 3px rgba(88, 166, 255, 0.15);
            transform: scale(1.05);
        }
        .checkbox-cell input[type="checkbox"]:checked {
            background: linear-gradient(135deg, #1f6feb 0%, #58a6ff 100%);
            border-color: #58a6ff;
            box-shadow: 0 2px 8px rgba(88, 166, 255, 0.4);
        }
        .checkbox-cell input[type="checkbox"]:checked::after {
            content: '';
            position: absolute;
            left: 5px;
            top: 2px;
            width: 5px;
            height: 10px;
            border: solid white;
            border-width: 0 2px 2px 0;
            transform: rotate(45deg);
        }
        .checkbox-cell input[type="checkbox"]:active {
            transform: scale(0.95);
        }
        /* Action buttons row */
        .action-row { display: flex; gap: 6px; align-items: center; }
        .action-divider { width: 1px; height: 20px; background: #30363d; margin: 0 6px; }
        
        /* Action button in table */
        .action-btn { background: transparent; border: 1px solid transparent; color: #8b949e; padding: 4px 8px; border-radius: 4px; font-size: 0.85em; cursor: pointer; transition: all 0.15s; }
        .action-btn:hover { background: #21262d; border-color: #30363d; color: #c9d1d9; }
        .action-btn.btn-download-row:hover { color: #3fb950; border-color: #238636; }
        
        /* Modal */
        .modal-overlay { position: fixed; inset: 0; background: rgba(0, 0, 0, 0.7); z-index: 2000; display: none; justify-content: center; align-items: center; }
        .modal-overlay.visible { display: flex !important; }
        .modal-box { background: #161b22; border: 1px solid #30363d; border-radius: 12px; min-width: 400px; max-width: 500px; max-height: 80vh; overflow: hidden; box-shadow: 0 8px 32px rgba(0, 0, 0, 0.4); }
        .modal-header { display: flex; justify-content: space-between; align-items: center; padding: 16px 20px; border-bottom: 1px solid #30363d; }
        .modal-header h3 { margin: 0; font-size: 1.1em; color: #e6edf3; }
        .modal-close { background: none; border: none; color: #8b949e; font-size: 1.5em; cursor: pointer; padding: 0; line-height: 1; }
        .modal-close:hover { color: #f85149; }
        .modal-content { padding: 20px; }
        .modal-field { margin-bottom: 16px; }
        .modal-field label { display: block; margin-bottom: 6px; font-size: 0.9em; color: #8b949e; }
        .modal-field input, .modal-field select { width: 100%; background: #0d1117; border: 1px solid #30363d; border-radius: 6px; padding: 10px 14px; color: #c9d1d9; font-size: 0.95em; outline: none; }
        .modal-field input:focus, .modal-field select:focus { border-color: #58a6ff; }
        .modal-actions { display: flex; gap: 8px; justify-content: flex-end; margin-top: 20px; }
        .modal-btn { padding: 8px 20px; border-radius: 6px; font-size: 0.9em; cursor: pointer; transition: all 0.15s; }
        .modal-btn-cancel { background: #21262d; border: 1px solid #30363d; color: #c9d1d9; }
        .modal-btn-cancel:hover { background: #30363d; }
        .modal-btn-primary { background: #238636; border: 1px solid #2ea043; color: #fff; }
        .modal-btn-primary:hover { background: #2ea043; }
        .modal-btn-danger { background: #da3633; border: 1px solid #f85149; color: #fff; }
        .modal-btn-danger:hover { background: #f85149; }
        
        /* Upload */
        .upload-zone { border: 2px dashed #30363d; border-radius: 8px; padding: 30px; text-align: center; cursor: pointer; transition: all 0.2s; }
        .upload-zone:hover, .upload-zone.dragover { border-color: #58a6ff; background: rgba(88, 166, 255, 0.05); }
        .upload-zone input[type="file"] { display: none; }
        
        /* Permission grid */
        .perm-grid { display: grid; grid-template-columns: repeat(3, 1fr); gap: 8px; margin-bottom: 16px; }
        .perm-check { display: flex; flex-direction: column; align-items: center; padding: 10px; background: #21262d; border-radius: 6px; }
        .perm-check label { font-size: 0.8em; color: #8b949e; margin-bottom: 4px; }
        .perm-check input[type="checkbox"] { width: 18px; height: 18px; accent-color: #58a6ff; }
        
        /* Confirm delete list */
        .delete-list { max-height: 200px; overflow-y: auto; background: #0d1117; border: 1px solid #30363d; border-radius: 6px; padding: 10px; margin: 10px 0; }
        .delete-list-item { padding: 6px 8px; font-family: monospace; font-size: 0.85em; border-bottom: 1px solid #21262d; }
        .delete-list-item:last-child { border-bottom: none; }
        
        /* Settings Panel */
        .settings-panel { position: fixed; top: 0; right: -400px; width: 400px; height: 100vh; background: #161b22; border-left: 1px solid #30363d; z-index: 2000; transition: right 0.3s ease; display: flex; flex-direction: column; }
        .settings-panel.open { right: 0; }
        .settings-header { display: flex; justify-content: space-between; align-items: center; padding: 16px 20px; border-bottom: 1px solid #30363d; }
        .settings-header h3 { margin: 0; font-size: 1.1em; color: #e6edf3; }
        .settings-close { background: none; border: none; color: #8b949e; font-size: 1.5em; cursor: pointer; padding: 0; line-height: 1; }
        .settings-close:hover { color: #f85149; }
        .settings-content { flex: 1; overflow-y: auto; padding: 20px; }
        .settings-section { margin-bottom: 24px; }
        .settings-section-title { font-size: 0.82em; color: #8b949e; text-transform: uppercase; letter-spacing: 0.8px; margin-bottom: 14px; display: flex; align-items: center; gap: 6px; }
        .settings-panel-overlay { position: fixed; inset: 0; background: rgba(0, 0, 0, 0.5); z-index: 1999; display: none; }
        .settings-panel-overlay.visible { display: block; }

        /* ── Responsive Design ─────────────────────────────── */
        @media (max-width: 768px) {
            /* Header */
            header { padding: 10px 12px; flex-wrap: wrap; gap: 8px; }
            header h1 { font-size: 1em; }
            .nav-tabs { margin-left: 0; order: 3; width: 100%; justify-content: center; }
            .nav-tab { padding: 6px 10px; font-size: 0.82em; }
            .settings-btn, .logout-btn { padding: 4px 8px; font-size: 0.78em; }

            /* Search Bar */
            .search-bar { padding: 10px 12px; flex-wrap: wrap; }
            .path-input { font-size: 0.9em; padding: 8px 10px; }
            .btn { padding: 8px 12px; font-size: 0.85em; }

            /* Quick Paths */
            .quick-paths { padding: 6px 12px; overflow-x: auto; flex-wrap: nowrap; -webkit-overflow-scrolling: touch; }
            .quick-paths > span { flex-shrink: 0; }
            .quick-btn { padding: 3px 8px; font-size: 0.75em; white-space: nowrap; }

            /* Breadcrumb */
            .breadcrumb { padding: 8px 12px; font-size: 0.8em; }

            /* File Header */
            .file-header { flex-direction: column; align-items: flex-start; padding: 10px 12px; gap: 8px; }
            .file-meta { flex-wrap: wrap; gap: 8px; }

            /* Directory Table */
            .dir-table { display: block; overflow-x: auto; -webkit-overflow-scrolling: touch; }
            .dir-table th, .dir-table td { padding: 8px 10px; font-size: 0.85em; white-space: nowrap; }
            .dir-table th:nth-child(4), .dir-table td:nth-child(4), /* 类型列 */
            .dir-table th:nth-child(6), .dir-table td:nth-child(6) { display: none; } /* 隐藏所有者列 */

            /* Toolbar */
            .dir-toolbar { padding: 8px 12px; gap: 6px; }
            .toolbar-btn { padding: 5px 10px; font-size: 0.8em; }
            .action-divider { display: none; }
            .selection-info { margin-left: 0; margin-top: 6px; width: 100%; text-align: center; }

            /* Code/Content */
            pre { padding: 12px; font-size: 0.82em; }
            .line-num { min-width: 36px; padding-right: 10px; }
            .edit-textarea { padding: 12px; font-size: 0.82em; }

            /* Markdown */
            .md-body { padding: 16px 12px; font-size: 0.9em; }
            .md-body h1 { font-size: 1.6em; }
            .md-body h2 { font-size: 1.3em; }
            .md-body h3 { font-size: 1.1em; }
            .md-body pre { padding: 12px; }

            /* Modal */
            .modal-box { min-width: auto; width: calc(100% - 24px); max-width: none; margin: 12px; max-height: 90vh; }
            .modal-content { padding: 16px; }
            .modal-actions { flex-direction: column; }
            .modal-btn { width: 100%; text-align: center; }
            .perm-grid { grid-template-columns: repeat(3, 1fr); gap: 6px; }
            .perm-check { padding: 8px 4px; }
            .perm-check label { font-size: 0.7em; }

            /* Login Card */
            .login-card { width: calc(100% - 24px); margin: 12px; padding: 30px 24px; }

            /* Settings Panel - 全屏 */
            .settings-panel { width: 100%; right: -100%; }
            .settings-content { padding: 16px; }

            /* Monitor */
            .monitor-wrap { padding: 12px; }
            .mon-header { flex-direction: column; align-items: flex-start; gap: 8px; }
            .mon-header h2 { font-size: 1em; }
            .mon-grid { grid-template-columns: 1fr; gap: 12px; }
            .mon-card { padding: 14px; }
            .mon-big-num { font-size: 1.6em; }
            .net-pair { gap: 20px; }

            /* Checkbox */
            .checkbox-cell { width: 32px; }
            .checkbox-cell input[type="checkbox"] { width: 18px; height: 18px; }
            .checkbox-cell input[type="checkbox"]:checked::after { left: 4px; top: 1px; width: 4px; height: 8px; }
        }

        @media (max-width: 480px) {
            /* 更小屏幕 */
            header h1 { font-size: 0.95em; }
            .nav-tab { padding: 5px 8px; font-size: 0.78em; }
            .quick-paths > span { display: none; } /* 隐藏"快捷："文字 */
            .quick-btn { padding: 3px 6px; font-size: 0.72em; }

            /* 隐藏更多表格列 */
            .dir-table th:nth-child(5), .dir-table td:nth-child(5) { display: none; } /* 隐藏权限列 */

            /* 工具栏按钮更紧凑 */
            .toolbar-btn { padding: 4px 8px; font-size: 0.75em; gap: 3px; }

            /* Action buttons */
            .action-btn { padding: 3px 6px; font-size: 0.78em; }
        }
    </style>
</head>
<body>

<div class="loading-bar" id="loadingBar"></div>

<!-- Login Overlay -->
<div id="loginOverlay" class="visible">
    <div class="login-card">
        <h2>File Viewer</h2>
        <p class="subtitle">请输入密码以继续</p>
        <div class="login-field">
            <label for="loginPassword">密码</label>
            <input type="password" id="loginPassword" placeholder="输入登录密码" autocomplete="current-password" />
        </div>
        <div class="login-error" id="loginError">密码错误，请重试</div>
        <button class="login-btn" id="loginBtn" onclick="doLogin()">登录</button>
    </div>
</div>

<header>
    <h1>File Viewer</h1>
    <div class="nav-tabs">
        <button class="nav-tab active" id="tabFiles" onclick="switchTab('files')">文件浏览</button>
        <button class="nav-tab" id="tabMonitor" onclick="switchTab('monitor')">系统监控</button>
    </div>
    <button class="settings-btn" onclick="openSettingsPanel()" title="设置">⚙️</button>
    <button class="logout-btn" onclick="doLogout()">退出登录</button>
</header>

<!-- ============ FILE VIEWER SECTION ============ -->
<div id="sectionFiles">
    <div class="search-bar">
        <input type="text" class="path-input" id="pathInput"
            placeholder="输入文件或目录的绝对路径，如 /etc/nginx/nginx.conf"
            autocomplete="off" spellcheck="false" />
        <button class="btn primary" onclick="loadPath()">查看</button>
        <button class="btn" onclick="goUp()">上级</button>
    </div>

    <div class="quick-paths">
        <span style="font-size:0.8em;color:#8b949e;align-self:center;">快捷：</span>
        <button class="quick-btn" onclick="setPath('/')">/ 根目录</button>
        <button class="quick-btn" onclick="setPath('/etc')">/etc</button>
        <button class="quick-btn" onclick="setPath('/var/log')">/var/log</button>
        <button class="quick-btn" onclick="setPath('/var/www/html')">/var/www/html</button>
        <button class="quick-btn" onclick="setPath('/etc/nginx/nginx.conf')">/etc/nginx/nginx.conf</button>
        <button class="quick-btn" onclick="setPath('/proc/cpuinfo')">/proc/cpuinfo</button>
        <button class="quick-btn" onclick="setPath('/proc/meminfo')">/proc/meminfo</button>
        <button class="quick-btn" onclick="setPath('/etc/passwd')">/etc/passwd</button>
        <button class="quick-btn" onclick="setPath('/etc/hosts')">/etc/hosts</button>
    </div>

    <div class="breadcrumb" id="breadcrumb">
        <span onclick="setPath('/')">/</span>
    </div>

    <div class="content-area" id="contentArea">
        <div class="state-box">
            <div class="state-icon">📂</div>
            <div class="state-title">文件查看器</div>
            <div class="state-msg">在上方输入文件路径，或点击快捷按钮浏览服务器文件</div>
        </div>
    </div>
</div>

<!-- ============ SYSTEM MONITOR SECTION ============ -->
<div id="sectionMonitor" class="section-hidden" style="flex:1;display:flex;flex-direction:column;">
    <div class="monitor-wrap" id="monitorContent">
        <div class="state-box">
            <div class="state-icon">⏳</div>
            <div class="state-title">加载中...</div>
        </div>
    </div>
</div>

<!-- ============ SETTINGS PANEL ============ -->
<div id="settingsPanelOverlay" class="settings-panel-overlay" onclick="closeSettingsPanel()"></div>
<div id="settingsPanel" class="settings-panel">
    <div class="settings-header">
        <h3>设置</h3>
        <button class="settings-close" onclick="closeSettingsPanel()">&times;</button>
    </div>
    <div class="settings-content">
        <div class="settings-section">
            <div class="settings-section-title">📋 删除白名单</div>
            <p style="color:#8b949e;font-size:0.85em;margin-bottom:12px;">只有白名单中的路径才允许删除操作</p>
            <div style="display:flex;gap:8px;margin-bottom:16px;">
                <input type="text" id="newWhitelistPath" class="path-input" placeholder="输入路径，如 /tmp" style="flex:1">
                <button class="btn success" onclick="addWhitelistPathFromPanel()">添加</button>
            </div>
            <div style="background:#0d1117;border:1px solid #30363d;border-radius:8px;overflow:hidden;">
                <div id="whitelistContainer">
                    <div class="state-box" style="padding:20px;">
                        <div class="state-msg">加载中...</div>
                    </div>
                </div>
            </div>
        </div>
        <div style="padding:16px;background:rgba(248,81,73,0.1);border:1px solid rgba(248,81,73,0.3);border-radius:8px;">
            <div style="color:#f85149;font-weight:600;margin-bottom:8px;">⚠️ 安全提示</div>
            <ul style="color:#8b949e;font-size:0.85em;margin-left:16px;line-height:1.6;">
                <li>白名单中的路径及其子目录都可以被删除</li>
                <li>请谨慎添加路径，避免误删系统重要文件</li>
                <li>建议只添加临时目录或上传目录等非关键路径</li>
            </ul>
        </div>
    </div>
</div>

<script>
let currentPath = '';
let currentFileData = null;
let currentTab = 'files';
let monitorTimer = null;
let currentDirPath = '';
let currentDirWritable = false;
let currentDirCanDelete = false;
let selectedItems = new Set();

function switchTab(tab) {
    currentTab = tab;
    document.getElementById('tabFiles').classList.toggle('active', tab === 'files');
    document.getElementById('tabMonitor').classList.toggle('active', tab === 'monitor');
    const sf = document.getElementById('sectionFiles');
    const sm = document.getElementById('sectionMonitor');
    if (tab === 'files') {
        sf.classList.remove('section-hidden');
        sm.classList.add('section-hidden');
        stopMonitor();
    } else if (tab === 'monitor') {
        sf.classList.add('section-hidden');
        sm.classList.remove('section-hidden');
        sm.style.display = 'flex';
        startMonitor();
    }
}

// Settings Panel Functions
function openSettingsPanel() {
    document.getElementById('settingsPanel').classList.add('open');
    document.getElementById('settingsPanelOverlay').classList.add('visible');
    loadWhitelist();
}

function closeSettingsPanel() {
    document.getElementById('settingsPanel').classList.remove('open');
    document.getElementById('settingsPanelOverlay').classList.remove('visible');
}

async function addWhitelistPathFromPanel() {
    const input = document.getElementById('newWhitelistPath');
    const path = input.value.trim();
    if (!path) { showNotification('请输入路径', 'error'); return; }
    try {
        const resp = await fetch('/api/whitelist', {
            method: 'POST',
            headers: { 'Content-Type': 'application/json' },
            body: JSON.stringify({ action: 'add', path })
        });
        const data = await resp.json();
        if (resp.ok) {
            input.value = '';
            renderWhitelist(data.whitelist);
            showNotification('添加成功', 'success');
        } else {
            showNotification(data.error || '添加失败', 'error');
        }
    } catch (e) {
        showNotification('添加失败: ' + e.message, 'error');
    }
}

function initFromUrl() {
    if (location.hash && location.hash.length > 1) {
        const path = decodeURIComponent(location.hash.slice(1));
        document.getElementById('pathInput').value = path;
        return true;
    }
    return false;
}

window.addEventListener('popstate', (event) => {
    if (event.state && event.state.path) {
        document.getElementById('pathInput').value = event.state.path;
        loadPathWithoutPush();
    }
});

async function loadPathWithoutPush() {
    const raw = document.getElementById('pathInput').value.trim();
    if (!raw) return;
    showLoading();
    currentPath = raw;
    selectedItems.clear();
    buildBreadcrumb(raw);
    try {
        const resp = await fetch('/api/file?path=' + encodeURIComponent(raw));
        const data = await resp.json();
        hideLoading();
        if (!resp.ok) {
            if (resp.status === 401) { showLogin(); return; }
            showError(resp.status, data.error || 'Unknown error', raw);
            return;
        }
        if (data.type === 'directory') renderDir(data);
        else { currentFileData = data; renderFile(data); }
    } catch (e) { hideLoading(); showError(0, '网络错误：' + e.message, raw); }
}

async function checkAuth() {
    try {
        const resp = await fetch('/api/auth/check');
        const data = await resp.json();
        if (data.authenticated) hideLogin();
        else showLogin();
    } catch { showLogin(); }
}

function showLogin() {
    stopMonitor();
    document.getElementById('loginOverlay').classList.add('visible');
    setTimeout(() => document.getElementById('loginPassword').focus(), 50);
}

function hideLogin() {
    document.getElementById('loginOverlay').classList.remove('visible');
    document.getElementById('loginPassword').value = '';
    document.getElementById('loginError').classList.remove('visible');
    if (initFromUrl()) loadPathWithoutPush();
}

async function doLogin() {
    const password = document.getElementById('loginPassword').value;
    if (!password) return;
    const btn = document.getElementById('loginBtn');
    btn.disabled = true;
    btn.textContent = '验证中...';
    try {
        const resp = await fetch('/api/login', {
            method: 'POST',
            headers: { 'Content-Type': 'application/json' },
            body: JSON.stringify({ password }),
        });
        if (resp.ok) hideLogin();
        else {
            document.getElementById('loginError').classList.add('visible');
            document.getElementById('loginPassword').value = '';
            document.getElementById('loginPassword').focus();
        }
    } catch {
        document.getElementById('loginError').textContent = '网络错误，请重试';
        document.getElementById('loginError').classList.add('visible');
    } finally { btn.disabled = false; btn.textContent = '登录'; }
}

async function doLogout() {
    stopMonitor();
    await fetch('/api/logout', { method: 'POST' });
    showLogin();
}

function setPath(p) {
    if (currentTab !== 'files') switchTab('files');
    document.getElementById('pathInput').value = p;
    loadPath();
}

function goUp() {
    const p = document.getElementById('pathInput').value.trim() || currentPath;
    if (!p || p === '/') return;
    const parent = p.replace(/\/[^/]+\/?$/, '') || '/';
    setPath(parent);
}

function buildBreadcrumb(path) {
    const bc = document.getElementById('breadcrumb');
    if (!path) { bc.innerHTML = '<span onclick="setPath(\'/\')">~</span>'; return; }
    const parts = path.split('/').filter(Boolean);
    let html = '<span onclick="setPath(\'/\')">root</span>';
    let cur = '';
    for (const part of parts) {
        cur += '/' + part;
        html += '<span class="sep"> / </span>';
        const p = cur;
        html += `<span onclick="setPath('${p.replace(/'/g, "\\'")}')">${escHtml(part)}</span>`;
    }
    bc.innerHTML = html;
}

function escHtml(s) { return s.replace(/&/g,'&amp;').replace(/</g,'&lt;').replace(/>/g,'&gt;'); }

function formatSize(n) {
    if (n == null) return '-';
    if (n < 1024) return n + ' B';
    if (n < 1024*1024) return (n/1024).toFixed(1) + ' KB';
    if (n < 1024*1024*1024) return (n/1024/1024).toFixed(1) + ' MB';
    return (n/1024/1024/1024).toFixed(2) + ' GB';
}

function formatRate(bytesPerSec) {
    if (bytesPerSec < 1024) return bytesPerSec.toFixed(0) + ' B/s';
    if (bytesPerSec < 1024*1024) return (bytesPerSec/1024).toFixed(1) + ' KB/s';
    return (bytesPerSec/1024/1024).toFixed(2) + ' MB/s';
}

function showLoading() { document.getElementById('loadingBar').style.width = '60%'; }
function hideLoading() { const b = document.getElementById('loadingBar'); b.style.width = '100%'; setTimeout(() => { b.style.width = '0'; }, 300); }

async function loadPath() {
    const raw = document.getElementById('pathInput').value.trim();
    if (!raw) return;
    showLoading();
    currentPath = raw;
    selectedItems.clear();
    buildBreadcrumb(raw);
    try {
        const resp = await fetch('/api/file?path=' + encodeURIComponent(raw));
        const data = await resp.json();
        hideLoading();
        if (!resp.ok) {
            if (resp.status === 401) { showLogin(); return; }
            showError(resp.status, data.error || 'Unknown error', raw);
            return;
        }
        if (data.type === 'directory') renderDir(data);
        else { currentFileData = data; renderFile(data); }
        history.pushState({path: raw}, '', '#' + encodeURIComponent(raw));
    } catch (e) { hideLoading(); showError(0, '网络错误：' + e.message, raw); }
}

function showError(status, msg, path) {
    const icons = { 403: '🔒', 404: '🔍', 413: '📦', 415: '🔢' };
    document.getElementById('contentArea').innerHTML = `
        <div class="state-box">
            <div class="state-icon">${icons[status] || '⚠️'}</div>
            <div class="state-title error">错误 ${status || ''}</div>
            <div class="state-msg">${escHtml(msg)}</div>
            <div class="state-msg" style="color:#484f58;margin-top:4px;font-family:monospace">${escHtml(path)}</div>
        </div>`;
}

// ── Selection Management ───────────────────────────────────

function toggleSelectAll() {
    const checkboxes = document.querySelectorAll('.item-checkbox');
    const allChecked = Array.from(checkboxes).every(cb => cb.checked);
    checkboxes.forEach(cb => {
        cb.checked = !allChecked;
        const path = cb.dataset.path;
        if (!allChecked) selectedItems.add(path);
        else selectedItems.delete(path);
    });
    updateSelectionInfo();
}

function toggleItem(path, checked) {
    if (checked) selectedItems.add(path);
    else selectedItems.delete(path);
    updateSelectionInfo();
}

function updateSelectionInfo() {
    const info = document.getElementById('selectionInfo');
    const downloadBtn = document.getElementById('downloadSelectedBtn');
    const deleteBtn = document.getElementById('deleteSelectedBtn');
    if (info) info.textContent = selectedItems.size > 0 ? `已选 ${selectedItems.size} 项` : '';
    if (downloadBtn) downloadBtn.disabled = selectedItems.size === 0;
    
    // 检查选中项是否都在白名单中（可删除）
    if (deleteBtn) {
        const checkboxes = document.querySelectorAll('.item-checkbox:checked');
        const allDeletable = Array.from(checkboxes).every(cb => cb.dataset.canDelete === 'true');
        deleteBtn.disabled = selectedItems.size === 0 || !allDeletable;
    }
}

// ── Download Functions ───────────────────────────────────

function downloadFile(path) {
    const link = document.createElement('a');
    link.href = '/api/file/download?path=' + encodeURIComponent(path);
    link.click();
}

async function downloadSelected() {
    if (selectedItems.size === 0) return;
    const paths = Array.from(selectedItems);
    if (paths.length === 1) {
        downloadFile(paths[0]);
        return;
    }
    showNotification('正在打包...', 'info');
    try {
        const resp = await fetch('/api/file/download/batch', {
            method: 'POST',
            headers: { 'Content-Type': 'application/json' },
            body: JSON.stringify({ paths })
        });
        if (!resp.ok) {
            const err = await resp.json();
            showNotification(err.error || '下载失败', 'error');
            return;
        }
        const blob = await resp.blob();
        const url = URL.createObjectURL(blob);
        const link = document.createElement('a');
        link.href = url;
        link.download = 'download.zip';
        link.click();
        URL.revokeObjectURL(url);
        showNotification('下载完成', 'success');
    } catch (e) {
        showNotification('下载失败: ' + e.message, 'error');
    }
}

// ── Delete Functions ───────────────────────────────────

function showDeleteModal(paths) {
    const pathList = paths.map(p => `<div class="delete-list-item">${escHtml(p)}</div>`).join('');
    document.getElementById('modalTitle').textContent = '确认删除';
    document.getElementById('modalContent').innerHTML = `
        <p style="color:#f85149;margin-bottom:10px">⚠️ 此操作不可撤销！</p>
        <p style="color:#8b949e;margin-bottom:10px">以下 ${paths.length} 项将被删除（仅白名单中的路径可删除）：</p>
        <div class="delete-list">${pathList}</div>
        <p style="color:#484f58;font-size:0.85em;margin-top:10px;">💡 提示：只有白名单中的路径才能被删除，如需修改白名单请前往"删除白名单"页面</p>
        <div class="modal-actions">
            <button class="modal-btn modal-btn-cancel" onclick="closeModal()">取消</button>
            <button class="modal-btn modal-btn-danger" onclick="doDelete()">确认删除</button>
        </div>
    `;
    openModal();
}

async function doDelete() {
    const paths = Array.from(selectedItems);
    if (paths.length === 0) return;
    try {
        const resp = await fetch('/api/file/delete', {
            method: 'POST',
            headers: { 'Content-Type': 'application/json' },
            body: JSON.stringify({ paths })
        });
        const result = await resp.json();
        if (resp.ok) {
            closeModal();
            showNotification(result.message || '删除成功', 'success');
            selectedItems.clear();
            document.getElementById('pathInput').value = currentDirPath;
            loadPathWithoutPush();
        } else {
            showNotification(result.error || '删除失败', 'error');
        }
    } catch (e) {
        showNotification('删除失败: ' + e.message, 'error');
    }
}

function deleteSelected() {
    if (selectedItems.size === 0) return;
    showDeleteModal(Array.from(selectedItems));
}

function deleteSingleItem(path) {
    selectedItems.clear();
    selectedItems.add(path);
    showDeleteModal([path]);
}

// ── Render Directory ───────────────────────────────────

function renderDir(data) {
    const entries = data.entries;
    const folderPerms = data.folder_permissions || {};
    const canWrite = folderPerms.write;
    // 使用后端返回的 can_delete（基于白名单检查）
    const dirCanDelete = data.can_delete || false;
    
    currentDirPath = data.path;
    currentDirWritable = canWrite;
    selectedItems.clear();
    
    // 工具栏
    let toolbarHtml = '<div class="dir-toolbar">';
    
    // 左侧：基本操作
    toolbarHtml += '<div class="action-row">';
    if (canWrite) {
        toolbarHtml += `<button class="toolbar-btn" onclick="showCreateModal('file')">新建文件</button>`;
        toolbarHtml += `<button class="toolbar-btn" onclick="showCreateModal('directory')">新建文件夹</button>`;
        toolbarHtml += `<button class="toolbar-btn" onclick="showUploadModal()">上传</button>`;
    }
    toolbarHtml += '</div>';
    
    // 分隔线
    if (entries.length > 0) {
        toolbarHtml += '<div class="action-divider"></div>';
        
        // 中间：选择操作
        toolbarHtml += '<div class="action-row">';
        toolbarHtml += `<button class="toolbar-btn" onclick="toggleSelectAll()" title="全选/取消全选">全选</button>`;
        toolbarHtml += `<button class="toolbar-btn btn-download" id="downloadSelectedBtn" onclick="downloadSelected()" disabled>⬇ 下载选中</button>`;
        // 只有当前目录在白名单中才显示批量删除按钮
        if (dirCanDelete) {
            toolbarHtml += `<button class="toolbar-btn btn-delete" id="deleteSelectedBtn" onclick="deleteSelected()" disabled>🗑 删除选中</button>`;
        }
        toolbarHtml += '</div>';
    }
    
    // 右侧：选择信息
    if (entries.length > 0) {
        toolbarHtml += `<span class="selection-info" id="selectionInfo"></span>`;
    }
    toolbarHtml += '</div>';
    
    if (entries.length === 0) {
        document.getElementById('contentArea').innerHTML = toolbarHtml + `<div class="state-box"><div class="state-icon">📁</div><div class="state-title">空目录</div><div class="state-msg">${escHtml(data.path)}</div></div>`;
        return;
    }
    
    const rows = entries.map(e => {
        const isDir = e.type === 'dir';
        const fullPath = data.path.replace(/\/$/, '') + '/' + e.name;
        const icon = isDir ? '📁' : getFileIcon(e.name);
        const nameClass = isDir ? 'dir-name' : 'file-name';
        const perms = e.permissions || {};
        const modeStr = perms.mode || (isDir ? 'drwxr-xr-x' : '-rw-r--r--');
        const octalStr = perms.octal || (isDir ? '0o755' : '0o644');
        const owner = perms.owner || '-';
        const entryCanDelete = e.can_delete || false;
        
        const permDisplay = `<span class="perm-link" style="font-family:monospace;font-size:0.82em;cursor:pointer;color:#58a6ff" onclick="showChmodModal('${fullPath.replace(/'/g, "\\'")}', '${octalStr}', '${escHtml(e.name)}')">${escHtml(modeStr)}</span>`;
        
        // 操作按钮：下载按钮 + 删除按钮（如果在白名单中）
        let actions = `<button class="action-btn btn-download-row" onclick="event.stopPropagation();downloadFile('${fullPath.replace(/'/g, "\\'")}')" title="下载">⬇ 下载</button>`;
        if (entryCanDelete) {
            actions += `<button class="action-btn" style="color:#f85149;" onclick="event.stopPropagation();deleteSingleItem('${fullPath.replace(/'/g, "\\'")}')" title="删除">🗑 删除</button>`;
        }
        
        return `<tr>
            <td class="checkbox-cell"><input type="checkbox" class="item-checkbox" data-path="${escHtml(fullPath)}" data-can-delete="${entryCanDelete}" onchange="toggleItem('${fullPath.replace(/'/g, "\\'")}', this.checked)"></td>
            <td><span class="dir-icon">${icon}</span><span class="${nameClass}" onclick="setPath('${fullPath.replace(/'/g, "\\'")}')">${escHtml(e.name)}</span></td>
            <td class="file-size">${isDir ? '-' : formatSize(e.size)}</td>
            <td style="color:#484f58;font-size:0.8em">${isDir ? 'dir' : 'file'}</td>
            <td style="font-family:monospace;font-size:0.8em">${permDisplay}</td>
            <td style="color:#8b949e;font-size:0.8em">${escHtml(owner)}</td>
            <td>${actions}</td>
        </tr>`;
    }).join('');
    
    document.getElementById('contentArea').innerHTML = toolbarHtml + `<table class="dir-table"><thead><tr><th class="checkbox-cell"></th><th>名称</th><th style="text-align:right">大小</th><th>类型</th><th>权限</th><th>所有者</th><th></th></tr></thead><tbody>${rows}</tbody></table>`;
}

function isMarkdown(path) { return /\.(md|markdown|mdown|mkd)$/i.test(path); }

function renderFile(data, viewMode) {
    const lines = data.content.split('\n');
    if (lines[lines.length - 1] === '') lines.pop();
    const isMd = isMarkdown(data.path);
    if (viewMode === undefined) viewMode = isMd ? 'preview' : 'source';
    
    const canWrite = data.folder_permissions && data.folder_permissions.write;
    const perms = data.permissions || {};
    const permInfo = perms.mode ? `<span title="Owner: ${perms.owner || '-'}">🔒 ${perms.mode}</span>` : '';
    
    const downloadBtn = `<button class="toggle-btn" onclick="downloadFile('${data.path.replace(/'/g, "\\'")}')">下载</button>`;
    const editBtn = canWrite ? `<button class="toggle-btn" onclick="enterEditMode()">编辑</button>` : '';
    
    const toggleHtml = `<div class="view-toggle">${downloadBtn}${editBtn}${isMd ? `<button class="toggle-btn ${viewMode === 'preview' ? 'active' : ''}" onclick="renderFile(currentFileData, 'preview')">预览</button><button class="toggle-btn ${viewMode === 'source' ? 'active' : ''}" onclick="renderFile(currentFileData, 'source')">源码</button>` : ''}</div>`;
    
    const headerHtml = `<div class="file-header"><span style="font-family:monospace;color:#c9d1d9">${escHtml(data.path)}</span><div class="file-meta">${toggleHtml}<span>📄 ${lines.length} 行</span><span>💾 ${formatSize(data.size)}</span>${permInfo}</div></div>`;
    
    if (isMd && viewMode === 'preview') {
        const renderer = new marked.Renderer();
        const origTable = renderer.table;
        renderer.table = function(header, body) { return '<div class="table-wrap">' + origTable.call(this, header, body) + '</div>'; };
        marked.setOptions({ breaks: true, gfm: true, renderer });
        document.getElementById('contentArea').innerHTML = headerHtml + `<div class="md-body">${marked.parse(data.content)}</div>`;
    } else {
        const lineHtml = lines.map((line, i) => `<div class="line"><span class="line-num">${i + 1}</span><span class="line-content">${escHtml(line)}</span></div>`).join('');
        document.getElementById('contentArea').innerHTML = headerHtml + `<pre>${lineHtml}</pre>`;
    }
}

// ── Edit Mode ───────────────────────────────────

let isEditMode = false;

function enterEditMode() {
    if (!currentFileData) return;
    isEditMode = true;
    const perms = currentFileData.permissions || {};
    const permInfo = perms.mode ? `<span>🔒 ${perms.mode}</span>` : '';
    
    const headerHtml = `<div class="file-header">
        <span style="font-family:monospace;color:#c9d1d9">${escHtml(currentFileData.path)}</span>
        <div class="file-meta">
            <div class="view-toggle">
                <button class="toggle-btn" onclick="cancelEdit()">取消</button>
                <button class="toggle-btn active" style="background:#238636;border-color:#2ea043" onclick="saveFile()">保存</button>
            </div>
            <span>编辑模式</span>
            ${permInfo}
        </div>
    </div>`;
    
    document.getElementById('contentArea').innerHTML = headerHtml + `<textarea class="edit-textarea" id="editTextarea">${escHtml(currentFileData.content)}</textarea>`;
}

function cancelEdit() {
    isEditMode = false;
    if (currentFileData) renderFile(currentFileData, 'source');
}

async function saveFile() {
    if (!currentFileData) return;
    const textarea = document.getElementById('editTextarea');
    if (!textarea) return;
    const newContent = textarea.value;
    const saveBtn = document.querySelector('.toggle-btn[onclick="saveFile()"]');
    if (saveBtn) { saveBtn.textContent = '保存中...'; saveBtn.disabled = true; }
    try {
        const resp = await fetch('/api/file/save', {
            method: 'POST',
            headers: { 'Content-Type': 'application/json' },
            body: JSON.stringify({ path: currentFileData.path, content: newContent })
        });
        const result = await resp.json();
        if (resp.ok) {
            currentFileData.content = newContent;
            currentFileData.size = result.size;
            isEditMode = false;
            renderFile(currentFileData, 'source');
            showNotification('保存成功', 'success');
        } else {
            showNotification(result.error || '保存失败', 'error');
            if (saveBtn) { saveBtn.textContent = '保存'; saveBtn.disabled = false; }
        }
    } catch (e) {
        showNotification('保存失败: ' + e.message, 'error');
        if (saveBtn) { saveBtn.textContent = '保存'; saveBtn.disabled = false; }
    }
}

function showNotification(msg, type) {
    const colors = {
        success: 'background:#238636;border:1px solid #2ea043',
        error: 'background:#da3633;border:1px solid #f85149',
        info: 'background:#1f6feb;border:1px solid #388bfd'
    };
    const notification = document.createElement('div');
    notification.style.cssText = `position:fixed;top:20px;right:20px;padding:12px 20px;border-radius:6px;color:#fff;font-size:0.9em;z-index:3000;${colors[type] || colors.info}`;
    notification.textContent = msg;
    document.body.appendChild(notification);
    setTimeout(() => notification.remove(), 3000);
}

// ── Modal ───────────────────────────────────

function openModal() { document.getElementById('modalOverlay').classList.add('visible'); }
function closeModal(e) { if (e && e.target !== e.currentTarget) return; document.getElementById('modalOverlay').classList.remove('visible'); }

// ── Create Modal ───────────────────────────────────

function showCreateModal(type) {
    const typeLabel = type === 'file' ? '文件' : '文件夹';
    document.getElementById('modalTitle').textContent = '新建' + typeLabel;
    document.getElementById('modalContent').innerHTML = `
        <div class="modal-field"><label>名称</label><input type="text" id="createName" placeholder="输入${typeLabel}名称" autocomplete="off" /></div>
        <div class="modal-field"><label>位置</label><input type="text" value="${escHtml(currentDirPath)}" readonly /></div>
        <div class="modal-actions">
            <button class="modal-btn modal-btn-cancel" onclick="closeModal()">取消</button>
            <button class="modal-btn modal-btn-primary" onclick="doCreate('${type}')">创建</button>
        </div>
    `;
    openModal();
    setTimeout(() => document.getElementById('createName').focus(), 50);
}

async function doCreate(type) {
    const name = document.getElementById('createName').value.trim();
    if (!name) { showNotification('请输入名称', 'error'); return; }
    try {
        const resp = await fetch('/api/file/create', {
            method: 'POST',
            headers: { 'Content-Type': 'application/json' },
            body: JSON.stringify({ parent: currentDirPath, name: name, type: type })
        });
        const result = await resp.json();
        if (resp.ok) {
            closeModal();
            showNotification('创建成功', 'success');
            document.getElementById('pathInput').value = currentDirPath;
            loadPathWithoutPush();
        } else { showNotification(result.error || '创建失败', 'error'); }
    } catch (e) { showNotification('创建失败: ' + e.message, 'error'); }
}

// ── Chmod Modal ───────────────────────────────────

let chmodTargetPath = '';

function showChmodModal(path, octal, name) {
    chmodTargetPath = path;
    const mode = parseInt(octal.replace('0o', ''), 8);
    document.getElementById('modalTitle').textContent = '修改权限 - ' + name;
    document.getElementById('modalContent').innerHTML = `
        <div class="modal-field"><label>路径</label><input type="text" value="${escHtml(path)}" readonly /></div>
        <div class="perm-grid">
            <div class="perm-check"><label>所有者读取</label><input type="checkbox" id="ur" ${mode & 0o400 ? 'checked' : ''}></div>
            <div class="perm-check"><label>所有者写入</label><input type="checkbox" id="uw" ${mode & 0o200 ? 'checked' : ''}></div>
            <div class="perm-check"><label>所有者执行</label><input type="checkbox" id="ux" ${mode & 0o100 ? 'checked' : ''}></div>
            <div class="perm-check"><label>组读取</label><input type="checkbox" id="gr" ${mode & 0o040 ? 'checked' : ''}></div>
            <div class="perm-check"><label>组写入</label><input type="checkbox" id="gw" ${mode & 0o020 ? 'checked' : ''}></div>
            <div class="perm-check"><label>组执行</label><input type="checkbox" id="gx" ${mode & 0o010 ? 'checked' : ''}></div>
            <div class="perm-check"><label>其他读取</label><input type="checkbox" id="or" ${mode & 0o004 ? 'checked' : ''}></div>
            <div class="perm-check"><label>其他写入</label><input type="checkbox" id="ow" ${mode & 0o002 ? 'checked' : ''}></div>
            <div class="perm-check"><label>其他执行</label><input type="checkbox" id="ox" ${mode & 0o001 ? 'checked' : ''}></div>
        </div>
        <div class="modal-field"><label>八进制值</label><input type="text" id="chmodOctal" value="${octal}" readonly style="font-family:monospace;text-align:center;font-size:1.2em" /></div>
        <div class="modal-actions">
            <button class="modal-btn modal-btn-cancel" onclick="closeModal()">取消</button>
            <button class="modal-btn modal-btn-primary" onclick="doChmod()">修改</button>
        </div>
    `;
    ['ur','uw','ux','gr','gw','gx','or','ow','ox'].forEach(id => {
        document.getElementById(id).addEventListener('change', updateOctalDisplay);
    });
    openModal();
}

function updateOctalDisplay() {
    const u = (document.getElementById('ur').checked ? 4 : 0) + (document.getElementById('uw').checked ? 2 : 0) + (document.getElementById('ux').checked ? 1 : 0);
    const g = (document.getElementById('gr').checked ? 4 : 0) + (document.getElementById('gw').checked ? 2 : 0) + (document.getElementById('gx').checked ? 1 : 0);
    const o = (document.getElementById('or').checked ? 4 : 0) + (document.getElementById('ow').checked ? 2 : 0) + (document.getElementById('ox').checked ? 1 : 0);
    document.getElementById('chmodOctal').value = '0o' + u.toString() + g.toString() + o.toString();
}

async function doChmod() {
    const mode = document.getElementById('chmodOctal').value;
    try {
        const resp = await fetch('/api/file/chmod', {
            method: 'POST',
            headers: { 'Content-Type': 'application/json' },
            body: JSON.stringify({ path: chmodTargetPath, mode })
        });
        const result = await resp.json();
        if (resp.ok) {
            closeModal();
            showNotification('权限修改成功', 'success');
            document.getElementById('pathInput').value = currentDirPath;
            loadPathWithoutPush();
        } else { showNotification(result.error || '修改失败', 'error'); }
    } catch (e) { showNotification('修改失败: ' + e.message, 'error'); }
}

// ── Upload ───────────────────────────────────

let selectedFilesList = [];

function showUploadModal() {
    document.getElementById('modalTitle').textContent = '上传文件';
    document.getElementById('modalContent').innerHTML = `
        <div class="modal-field"><label>目标目录</label><input type="text" value="${escHtml(currentDirPath)}" readonly /></div>
        <div class="upload-zone" id="uploadZone" onclick="document.getElementById('fileInput').click()">
            <input type="file" id="fileInput" multiple onchange="handleFileSelect(event)">
            <div style="font-size:2em;margin-bottom:10px">📁</div>
            <div style="color:#8b949e">点击或拖拽文件到此处上传</div>
            <div id="selectedFiles" style="margin-top:10px;font-size:0.85em;color:#58a6ff"></div>
        </div>
        <div class="modal-actions">
            <button class="modal-btn modal-btn-cancel" onclick="closeModal()">取消</button>
            <button class="modal-btn modal-btn-primary" onclick="doUpload()">上传</button>
        </div>
    `;
    const zone = document.getElementById('uploadZone');
    zone.addEventListener('dragover', (e) => { e.preventDefault(); zone.classList.add('dragover'); });
    zone.addEventListener('dragleave', () => zone.classList.remove('dragover'));
    zone.addEventListener('drop', (e) => {
        e.preventDefault();
        zone.classList.remove('dragover');
        document.getElementById('fileInput').files = e.dataTransfer.files;
        handleFileSelect({ target: { files: e.dataTransfer.files } });
    });
    openModal();
}

function handleFileSelect(event) {
    selectedFilesList = Array.from(event.target.files);
    const names = selectedFilesList.map(f => f.name).join(', ');
    document.getElementById('selectedFiles').textContent = selectedFilesList.length > 0 ? `已选择 ${selectedFilesList.length} 个文件: ${names}` : '';
}

async function doUpload() {
    if (selectedFilesList.length === 0) { showNotification('请选择文件', 'error'); return; }
    let successCount = 0, errorCount = 0;
    for (const file of selectedFilesList) {
        const formData = new FormData();
        formData.append('file', file);
        formData.append('path', currentDirPath);
        try {
            const resp = await fetch('/api/file/upload', { method: 'POST', body: formData });
            if (resp.ok) successCount++; else errorCount++;
        } catch (e) { errorCount++; }
    }
    closeModal();
    if (successCount > 0) { showNotification(`成功上传 ${successCount} 个文件`, 'success'); document.getElementById('pathInput').value = currentDirPath; loadPathWithoutPush(); }
    if (errorCount > 0) showNotification(`${errorCount} 个文件上传失败`, 'error');
}

function getFileIcon(name) {
    const ext = name.split('.').pop().toLowerCase();
    const map = { js:'📜',ts:'📜',py:'🐍',sh:'⚙️',html:'🌐',css:'🎨',json:'📋',yaml:'📋',yml:'📋',md:'📑',txt:'📝',log:'📃',zip:'📦',tar:'📦',gz:'📦',pdf:'📕',png:'🖼️',jpg:'🖼️',gif:'🖼️',svg:'🖼️',key:'🔑',pem:'🔑' };
    return map[ext] || '📄';
}

// ── System Monitor ────────────────────────────────────

function startMonitor() { if (monitorTimer) return; fetchSystemInfo(); monitorTimer = setInterval(fetchSystemInfo, 3000); }
function stopMonitor() { if (monitorTimer) { clearInterval(monitorTimer); monitorTimer = null; } }

// ── Whitelist Management ──────────────────────────────

async function loadWhitelist() {
    try {
        const resp = await fetch('/api/whitelist', { method: 'POST', headers: { 'Content-Type': 'application/json' }, body: '{}' });
        if (resp.status === 401) { showLogin(); return; }
        const data = await resp.json();
        renderWhitelist(data.whitelist || []);
    } catch (e) {
        document.getElementById('whitelistContainer').innerHTML = `<div class="state-box" style="padding:20px;"><div class="state-msg error">加载失败: ${escHtml(e.message)}</div></div>`;
    }
}

function renderWhitelist(whitelist) {
    const container = document.getElementById('whitelistContainer');
    if (!whitelist || whitelist.length === 0) {
        container.innerHTML = `<div class="state-box" style="padding:20px;"><div class="state-msg" style="color:#8b949e;">白名单为空，删除功能将被禁用</div></div>`;
        return;
    }
    const items = whitelist.map((path, idx) => `
        <div style="display:flex;align-items:center;padding:10px 12px;border-bottom:1px solid #21262d;">
            <span style="font-family:monospace;color:#58a6ff;flex:1;font-size:0.88em;">${escHtml(path)}</span>
            <button class="action-btn" style="color:#f85149;" onclick="removeWhitelistPath('${escHtml(path).replace(/'/g, "\\'")}')" title="移除">移除</button>
        </div>
    `).join('');
    container.innerHTML = items;
}



async function removeWhitelistPath(path) {
    try {
        const resp = await fetch('/api/whitelist', {
            method: 'POST',
            headers: { 'Content-Type': 'application/json' },
            body: JSON.stringify({ action: 'remove', path })
        });
        const data = await resp.json();
        if (resp.ok) {
            renderWhitelist(data.whitelist);
            showNotification('移除成功', 'success');
        } else {
            showNotification(data.error || '移除失败', 'error');
        }
    } catch (e) {
        showNotification('移除失败: ' + e.message, 'error');
    }
}

document.addEventListener('visibilitychange', () => {
    if (document.hidden && currentTab === 'monitor') stopMonitor();
    else if (!document.hidden && currentTab === 'monitor') startMonitor();
});

async function fetchSystemInfo() {
    try {
        const resp = await fetch('/api/system');
        if (resp.status === 401) { showLogin(); return; }
        const d = await resp.json();
        renderMonitor(d);
    } catch (e) {
        document.getElementById('monitorContent').innerHTML = `<div class="state-box"><div class="state-icon">⚠️</div><div class="state-title error">无法获取系统信息</div><div class="state-msg">${escHtml(e.message)}</div></div>`;
    }
}

function pbarClass(pct) { if (pct < 60) return 'pbar-green'; if (pct < 85) return 'pbar-yellow'; return 'pbar-red'; }

function renderMonitor(d) {
    const cpu = d.cpu || {}, mem = d.memory || {}, net = d.network || {}, load = d.load || {}, procs = d.processes || [], disks = d.disks || [];
    const now = new Date().toLocaleTimeString('zh-CN', { hour12: false });
    let html = `<div class="mon-header"><h2>${escHtml(d.hostname || 'Server')}</h2><div class="mon-meta"><span class="mon-live"><span class="mon-live-dot"></span> 实时</span><span>更新于 ${now}</span></div></div><div class="mon-grid">`;
    html += `<div class="mon-card"><div class="mon-card-title">🖥️ 系统</div><div class="mon-row"><span class="label">系统</span><span class="val">${escHtml(d.os || '')}</span></div><div class="mon-row"><span class="label">内核</span><span class="val">${escHtml(d.kernel || '')}</span></div><div class="mon-row"><span class="label">运行</span><span class="val">${escHtml(d.uptime || '')}</span></div></div>`;
    const cpuPct = cpu.usage_percent || 0;
    html += `<div class="mon-card"><div class="mon-card-title">⚡ CPU</div><div class="mon-big-num">${cpuPct.toFixed(1)}%</div><div class="pbar-wrap"><div class="pbar ${pbarClass(cpuPct)}" style="width:${cpuPct}%"></div></div><div class="mon-row"><span class="label">核心</span><span class="val">${cpu.physical_cores || '-'} / ${cpu.threads || '-'}</span></div><div class="mon-row"><span class="label">负载</span><span class="val">${load['1m']?.toFixed(2)} / ${load['5m']?.toFixed(2)} / ${load['15m']?.toFixed(2)}</span></div></div>`;
    const memPct = mem.usage_percent || 0;
    html += `<div class="mon-card"><div class="mon-card-title">🧠 内存</div><div class="mon-big-num">${memPct.toFixed(1)}%</div><div class="pbar-wrap"><div class="pbar ${pbarClass(memPct)}" style="width:${memPct}%"></div></div><div class="mon-row"><span class="label">已用</span><span class="val">${formatSize(mem.used)} / ${formatSize(mem.total)}</span></div></div>`;
    html += `<div class="mon-card"><div class="mon-card-title">🌐 网络</div><div class="net-pair"><div><div class="net-rate" style="color:#4ade80">↓ ${formatRate(net.rx_rate || 0)}</div><div class="net-label">下行</div></div><div><div class="net-rate" style="color:#58a6ff">↑ ${formatRate(net.tx_rate || 0)}</div><div class="net-label">上行</div></div></div></div>`;
    html += `<div class="mon-card"><div class="mon-card-title">💾 磁盘</div>`;
    disks.forEach(dk => { const dkPct = dk.usage_percent || 0; html += `<div class="disk-item"><div class="disk-mount">${escHtml(dk.mount)}</div><div class="pbar-wrap" style="margin:4px 0"><div class="pbar ${pbarClass(dkPct)}" style="width:${dkPct}%"></div></div><div class="disk-detail"><span>${formatSize(dk.used)}</span><span>${formatSize(dk.available)}</span></div></div>`; });
    html += '</div>';
    if (procs.length > 0) { html += `<div class="mon-card wide"><div class="mon-card-title">📊 进程</div><table class="proc-table"><thead><tr><th>PID</th><th>用户</th><th>CPU%</th><th>MEM%</th><th>命令</th></tr></thead><tbody>`; procs.forEach(p => { html += `<tr><td>${p.pid}</td><td>${escHtml(p.user)}</td><td>${p.cpu.toFixed(1)}</td><td>${p.mem.toFixed(1)}</td><td style="max-width:300px;overflow:hidden;text-overflow:ellipsis;white-space:nowrap">${escHtml(p.command)}</td></tr>`; }); html += '</tbody></table></div>'; }
    html += '</div>';
    document.getElementById('monitorContent').innerHTML = html;
}

// ── Init ──────────────────────────────────────────────

document.getElementById('pathInput').addEventListener('keydown', e => { if (e.key === 'Enter') loadPath(); });
document.getElementById('loginPassword').addEventListener('keydown', e => { if (e.key === 'Enter') doLogin(); });
checkAuth();
</script>

        <div class="modal-header">
            <h3 id="modalTitle">标题</h3>
            <button class="modal-close" onclick="closeModal()">&times;</button>
        </div>
        <div id="modalContent" class="modal-content"></div>
    </div>
</div>
